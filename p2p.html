<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>CryptoSwap — P2P</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="has-pc-nav">
    <canvas id="bg-canvas"></canvas>
    <!-- PC NAV (hidden on mobile) -->
    <div class="pc-nav">
      <div class="pc-nav-logo">⚡ CryptoSwap</div>
      <div class="pc-nav-links">
        <span
          class="pc-nav-link active"
          onclick="window.location.href='home.html'"
          >Home</span
        >
        <span class="pc-nav-link" onclick="window.location.href='p2p.html'"
          >P2P</span
        >
        <span class="pc-nav-link" onclick="window.location.href='deposit.html'"
          >Deposit</span
        >
        <span class="pc-nav-link" onclick="window.location.href='withdraw.html'"
          >Withdraw</span
        >
        <span class="pc-nav-link" onclick="window.location.href='profile.html'"
          >Profile</span
        >
      </div>
    </div>

    <div class="page">
      <!-- TOP BAR -->
      <div class="top-bar">
        <span style="font-size: 20px; cursor: pointer" onclick="goBack()"
          >←</span
        >
        <div class="top-bar-logo">⚡ CryptoSwap</div>
        <div class="top-bar-right">
          <span class="kyc-badge none" id="kyc-badge">No KYC</span>
        </div>
      </div>

      <!-- P2P HEADER -->
      <div
        style="
          padding: 12px 16px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          border-bottom: 1px solid var(--border);
        "
      >
        <div class="tabs" style="width: 140px">
          <button class="tab active" id="tab-buy" onclick="setOrderType('buy')">
            Buy
          </button>
          <button class="tab" id="tab-sell" onclick="setOrderType('sell')">
            Sell
          </button>
        </div>

        <div
          style="display: flex; align-items: center; gap: 6px; cursor: pointer"
          onclick="openCurrencyPicker()"
        >
          <span style="font-size: 18px" id="selected-flag">🇪🇹</span>
          <span style="font-weight: 700; font-size: 14px" id="selected-currency"
            >ETB</span
          >
          <span style="color: var(--text2); font-size: 14px">▾</span>
        </div>
      </div>

      <!-- CRYPTO SELECTOR -->
      <div style="padding: 12px 16px 0; display: flex; gap: 8px">
        <button
          class="crypto-pill active"
          id="tab-usdt"
          onclick="setCrypto('USDT')"
        >
          <span
            class="coin-icon usdt"
            style="width: 22px; height: 22px; font-size: 12px"
            >₮</span
          >
          USDT
        </button>
        <button class="crypto-pill" id="tab-btc" onclick="setCrypto('BTC')">
          <span
            class="coin-icon btc"
            style="width: 22px; height: 22px; font-size: 12px"
            >₿</span
          >
          BTC
        </button>
      </div>

      <!-- AMOUNT FILTER -->
      <div style="padding: 12px 16px">
        <div class="input-row" style="margin: 0">
          <span class="input-suffix">Amount</span>
          <input
            type="number"
            id="amount-filter"
            placeholder="0"
            min="0"
            oninput="filterByAmount()"
          />
          <span class="input-suffix" id="amount-currency-label">ETB</span>
        </div>
      </div>

      <!-- LISTINGS -->
      <div id="listings-container">
        <!-- listings render here -->
      </div>
    </div>

    <!-- CURRENCY PICKER MODAL -->
    <div id="currency-modal" class="modal-overlay" style="display: none">
      <div class="modal-sheet">
        <div class="modal-header">
          <span class="modal-title">Select Currency</span>
          <span class="modal-close" onclick="closeCurrencyPicker()">✕</span>
        </div>
        <div class="input-row" style="margin: 0 16px 12px">
          <span class="input-suffix">🔍</span>
          <input
            type="text"
            id="currency-search"
            placeholder="Search currency..."
            oninput="renderCurrencyList()"
          />
        </div>
        <div id="currency-list" class="modal-list"></div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
      <button
        class="nav-item active"
        onclick="window.location.href='home.html'"
      >
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10"
          />
        </svg>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" onclick="window.location.href='p2p.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M7 3L3 7l4 4" />
          <path d="M3 7h13a4 4 0 014 4v1" />
          <path d="M17 21l4-4-4-4" />
          <path d="M21 17H8a4 4 0 01-4-4v-1" />
        </svg>
        <span class="nav-label">P2P</span>
      </button>
      <button class="nav-item" onclick="window.location.href='deposit.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 3v12" />
          <path d="M7 10l5 5 5-5" />
          <path d="M5 19h14" />
        </svg>
        <span class="nav-label">Deposit</span>
      </button>
      <button class="nav-item" onclick="window.location.href='messages.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
        </svg>
        <span class="nav-label">Messages</span>
      </button>
      <button class="nav-item" onclick="window.location.href='profile.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="8" r="4" />
          <path d="M4 21c0-4 4-6 8-6s8 2 8 6" />
        </svg>
        <span class="nav-label">Profile</span>
      </button>
    </div>
    <div id="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script src="currencies.js"></script>
    <script src="listings.js"></script>
    <script src="p2p.js"></script>
  </body>
</html>
