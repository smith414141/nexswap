<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Kripex — Withdraw</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="withdraw.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body class="has-pc-nav">
    <canvas id="bg-canvas"></canvas>

    <!-- PC NAV -->
    <div class="pc-nav with-ticker">
      <a class="pc-nav-logo" href="home.html">⚡ Kripex</a>
      <div class="pc-nav-right">
        <button class="icon-btn" title="Notifications" onclick="window.location.href='notifications.html'">
          🔔
        </button>
        <button class="icon-btn" title="Messages" onclick="window.location.href='messages.html'">
          ✉️
        </button>
        <div class="profile-menu-wrap" id="profile-menu-wrap">
          <div class="profile-avatar" onclick="toggleProfileMenu()">👤</div>
          <div class="profile-menu">
            <a href="profile.html">Profile</a>
            <a href="settings.html">Settings</a>
            <a href="#" onclick="logoutUser()">Logout</a>
          </div>
        </div>
      </div>
    </div>

    <!-- PC SIDEBAR -->
    <div class="pc-sidebar">
      <a class="pc-sidebar-link" href="home.html"
        ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10" /></svg
        >Home</a
      >
      <a class="pc-sidebar-link" href="p2p.html"
        ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M7 3L3 7l4 4" />
          <path d="M3 7h13a4 4 0 014 4v1" />
          <path d="M17 21l4-4-4-4" />
          <path d="M21 17H8a4 4 0 01-4-4v-1" /></svg
        >P2P</a
      >
      <a class="pc-sidebar-link" href="deposit.html"
        ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 3v12" />
          <path d="M7 10l5 5 5-5" />
          <path d="M5 19h14" /></svg
        >Deposit</a
      >
      <a class="pc-sidebar-link active" href="withdraw.html"
        ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 19V7" />
          <path d="M7 12l5-5 5 5" />
          <path d="M5 19h14" /></svg
        >Withdraw</a
      >
      <a class="pc-sidebar-link" href="messages.html"
        ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path
            d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
          /></svg
        >Messages</a
      >
      <a class="pc-sidebar-link" href="profile.html"
        ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4" />
          <path d="M4 21c0-4 4-6 8-6s8 2 8 6" /></svg
        >Profile</a
      >
      <a class="pc-sidebar-link" href="settings.html"
        ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"
          /></svg
        >Settings</a
      >
    </div>

    <div class="pc-main">
      <!-- LIVE PRICE TICKER -->
      <div class="pc-ticker-bar" id="pc-ticker-bar">
        <div class="pc-ticker-track" id="pc-ticker-track">
          <span class="pc-ticker-item"><span class="sym">Loading prices…</span></span>
        </div>
      </div>

      <div class="withdraw-page">
        <!-- HEADER -->
        <div class="withdraw-header">
          <h1 class="withdraw-title" id="withdraw-title">Withdraw USDT</h1>
        </div>

        <!-- SELECT CRYPTO (pills) -->
        <div class="withdraw-section">
          <p class="withdraw-section-label">Select Crypto</p>
          <div class="withdraw-pill-group" id="withdraw-crypto-pills"></div>
        </div>

        <!-- SELECT NETWORK (pills) -->
        <div class="withdraw-section">
          <p class="withdraw-section-label">Network</p>
          <div class="withdraw-pill-group" id="withdraw-network-pills"></div>
        </div>

        <!-- WITHDRAWAL ADDRESS -->
        <div class="withdraw-section">
          <p class="withdraw-section-label">Withdrawal Address</p>
          <div class="withdraw-input-row">
            <input type="text" id="wd-address" placeholder="Enter wallet address" />
            <button class="btn btn-secondary withdraw-btn-sm" onclick="openAddressBook()">📋 Book</button>
            <button class="btn btn-secondary withdraw-btn-sm" onclick="saveCurrentAddress()">💾 Save</button>
          </div>
        </div>

        <!-- AMOUNT -->
        <div class="withdraw-section">
          <div class="withdraw-amount-header">
            <p class="withdraw-section-label">Amount</p>
            <div class="withdraw-max-link" id="wd-max-display" onclick="setMaxWithdraw()">MAX</div>
          </div>
          <div class="withdraw-input-row">
            <input type="number" id="wd-amount" placeholder="0.00" min="0" step="any" oninput="updateWdSummary()" onkeydown="if(event.key==='Enter'){event.preventDefault(); submitWithdrawal();}" />
            <span class="input-suffix text-brass" id="wd-amount-suffix">USDT</span>
          </div>
          <p class="withdraw-available" id="wd-available">Available: <span>0.00</span> USDT</p>
        </div>

        <!-- FEE + RECEIVE SUMMARY -->
        <div class="withdraw-summary-card">
          <div class="withdraw-summary-row">
            <span class="withdraw-summary-label">Network Fee</span>
            <span class="withdraw-summary-value withdraw-fee-value" id="wd-fee">--</span>
          </div>
          <div class="withdraw-summary-row">
            <span class="withdraw-summary-label">You'll Receive</span>
            <span class="withdraw-summary-value withdraw-receive-value" id="wd-receive">--</span>
          </div>
        </div>

        <!-- SUBMIT BUTTON -->
        <button class="withdraw-submit-btn" id="wd-submit-btn" onclick="submitWithdrawal()" disabled>Submit Withdrawal</button>
      </div>
    </div>

    <!-- ADDRESS BOOK MODAL -->
    <div id="address-book-modal" class="modal-overlay address-book-modal" style="display: none">
      <div class="modal-sheet">
        <div class="modal-header">
          <span class="modal-title">📋 Saved Addresses</span>
          <span class="modal-close" onclick="document.getElementById('address-book-modal').style.display='none'">✕</span>
        </div>
        <div class="address-book-list" id="address-book-list">
          <div class="empty-state">Loading…</div>
        </div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
      <button class="nav-item" onclick="window.location.href='home.html'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10" />
        </svg>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" onclick="window.location.href='p2p.html'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 3L3 7l4 4" />
          <path d="M3 7h13a4 4 0 014 4v1" />
          <path d="M17 21l4-4-4-4" />
          <path d="M21 17H8a4 4 0 01-4-4v-1" />
        </svg>
        <span class="nav-label">P2P</span>
      </button>
      <button class="nav-item" onclick="window.location.href='portfolio.html'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 8v4l3 3" />
        </svg>
        <span class="nav-label">Portfolio</span>
      </button>
      <button class="nav-item" onclick="window.location.href='deposit.html'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v12" />
          <path d="M7 10l5 5 5-5" />
          <path d="M5 19h14" />
        </svg>
        <span class="nav-label">Deposit</span>
      </button>
      <button class="nav-item active" onclick="window.location.href='withdraw.html'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19V7" />
          <path d="M7 12l5-5 5 5" />
          <path d="M5 19h14" />
        </svg>
        <span class="nav-label">Withdraw</span>
      </button>
      <button class="nav-item" onclick="window.location.href='messages.html'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
        </svg>
        <span class="nav-label">Messages</span>
      </button>
      <button class="nav-item" onclick="window.location.href='profile.html'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4" />
          <path d="M4 21c0-4 4-6 8-6s8 2 8 6" />
        </svg>
        <span class="nav-label">Profile</span>
      </button>
    </div>

    <div id="toast-container"></div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script src="wallet.js"></script>
    <script src="withdraw.js"></script>
  </body>
</html>
