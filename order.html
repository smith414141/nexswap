<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>CryptoSwap — Order</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <div class="page" style="padding-bottom: 24px">
      <div class="top-bar">
        <span style="font-size: 20px; cursor: pointer" onclick="goBack()"
          >←</span
        >
        <div class="top-bar-logo" style="font-size: 16px">Order Details</div>
        <span style="width: 20px"></span>
      </div>

      <div style="padding: 16px">
        <!-- TRADER CARD -->
        <div
          class="card"
          style="
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
          "
        >
          <div
            id="trader-avatar"
            style="
              width: 44px;
              height: 44px;
              border-radius: 50%;
              display: flex;
              align-items: center;
              justify-content: center;
              font-weight: 800;
              font-size: 14px;
              flex-shrink: 0;
            "
          ></div>
          <div style="flex: 1">
            <div style="display: flex; align-items: center; gap: 6px">
              <span
                id="trader-name"
                style="font-weight: 700; font-size: 14px"
              ></span>
              <span id="trader-verified" class="verified-icon"></span>
            </div>
            <div
              style="font-size: 11px; color: var(--text2)"
              id="trader-stats"
            ></div>
          </div>
          <span class="order-type" id="order-type-badge"></span>
        </div>

        <!-- STEP 1: AMOUNT ENTRY -->
        <div id="step-amount">
          <div class="card" style="margin-bottom: 16px">
            <p class="section-title" id="amount-entry-title">Enter Amount</p>
            <div class="input-row">
              <input
                type="number"
                id="fiat-amount"
                placeholder="0"
                min="0"
                oninput="calcCrypto()"
              />
              <span class="input-suffix" id="fiat-currency-label">ETB</span>
            </div>
            <div
              style="
                text-align: center;
                font-size: 12px;
                color: var(--text2);
                margin: 8px 0;
              "
            >
              ≈ <span id="crypto-amount-display">0</span>
              <span id="crypto-label"></span>
            </div>
            <div
              style="font-size: 11px; color: var(--text3); text-align: center"
              id="limit-display"
            ></div>
          </div>

          <!-- SELL: payout details -->
          <div
            class="card"
            id="payout-section"
            style="display: none; margin-bottom: 16px"
          >
            <p class="section-title">Your Payout Details</p>
            <div class="form-group">
              <label>Payment Method</label>
              <select id="payout-method"></select>
            </div>
            <div class="form-group">
              <label>Account / Phone Number</label>
              <input
                type="text"
                id="payout-account"
                placeholder="Enter account number"
              />
            </div>
          </div>

          <button
            class="btn-primary"
            id="confirm-order-btn"
            onclick="confirmOrder()"
          >
            Confirm Order
          </button>
        </div>

        <!-- STEP 2: ACTIVE ORDER -->
        <div id="step-order" style="display: none">
          <div class="timer-box" id="timer-box">
            <span class="timer-icon">⏱️</span>
            <span class="timer-text" id="timer-text"
              >Time remaining to pay</span
            >
            <span class="timer-count" id="timer-count">10:00</span>
          </div>

          <div class="card" style="margin-bottom: 16px">
            <div class="payment-info-row">
              <span>Order ID</span><strong id="order-id-display">--</strong>
            </div>
            <div class="payment-info-row">
              <span>Amount</span><strong id="order-fiat-display">--</strong>
            </div>
            <div class="payment-info-row">
              <span>You'll get</span
              ><strong id="order-crypto-display">--</strong>
            </div>
            <div class="payment-info-row">
              <span>Rate</span><strong id="order-rate-display">--</strong>
            </div>
            <div class="payment-info-row">
              <span>Status</span
              ><span class="badge" id="order-status-badge">--</span>
            </div>
          </div>

          <div id="status-content"></div>

          <p class="section-title" style="margin-top: 16px">Chat with Trader</p>
          <div class="chat-box">
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-row">
              <input
                type="text"
                id="chat-input"
                placeholder="Type a message..."
                onkeypress="if(event.key==='Enter') sendMessage()"
              />
              <button class="chat-send-btn" onclick="sendMessage()">➤</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script src="payment-details.js"></script>
    <script src="order.js"></script>
  </body>
</html>
