<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Kripex — P2P</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body class="has-pc-nav">
    <canvas id="bg-canvas"></canvas>
    <!-- PC NAV (hidden on mobile) -->
    <div class="pc-nav with-ticker">
      <a class="pc-nav-logo" href="home.html">⚡ Kripex</a>
      <div class="pc-nav-right">
        <button class="icon-btn" title="Notifications" onclick="window.location.href='notifications.html'">
          🔔
        </button>
        <button class="icon-btn" title="Messages" onclick="window.location.href='messages.html'">
          ✉️
        </button>
        <div class="profile-menu-wrap" id="profile-menu-wrap">
          <div class="profile-avatar" onclick="toggleProfileMenu()">👤</div>
          <div class="profile-menu">
            <a href="profile.html">Profile</a>
            <a href="settings.html">Settings</a>
            <a href="#" onclick="logoutUser()">Logout</a>
          </div>
        </div>
      </div>
    </div>
    <div class="pc-sidebar">
      <div class="pc-sidebar-group-label">Main</div>
      <a class="pc-sidebar-link" href="home.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
        Dashboard
      </a>
      <a class="pc-sidebar-link" href="markets.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
        Markets
      </a>
      <a class="pc-sidebar-link" href="trade.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M7 3L3 7l4 4"/><path d="M3 7h13a4 4 0 014 4v1"/>
          <path d="M17 21l4-4-4-4"/><path d="M21 17H8a4 4 0 01-4-4v-1"/>
        </svg>
        Trade
      </a>
      <a class="pc-sidebar-link" href="wallet.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/>
          <circle cx="17" cy="15" r="1.4" fill="currentColor" stroke="none"/>
        </svg>
        Wallet
      </a>
      <a class="pc-sidebar-link" href="portfolio.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a10 10 0 1010 10H12V2z"/><path d="M21 8A8.99 8.99 0 0014 2v6h7z"/>
        </svg>
        Portfolio
      </a>
      <div class="pc-sidebar-group-label">Discover</div>
      <a class="pc-sidebar-link active" href="p2p.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/>
          <path d="M16 3.13a4 4 0 010 7.75"/><path d="M21 21v-2a4 4 0 00-3-3.87"/>
        </svg>
        P2P Trading
      </a>
      <a class="pc-sidebar-link" href="earn.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4"/>
        </svg>
        Earn
      </a>
      <a class="pc-sidebar-link" href="products.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="5" cy="12" r="1.5" fill="currentColor"/>
          <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
          <circle cx="19" cy="12" r="1.5" fill="currentColor"/>
        </svg>
        More
      </a>
      <div class="pc-sidebar-spacer"></div>
      <a class="pc-sidebar-link pc-sidebar-logout" href="#" onclick="logoutUser();return false;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <path d="M16 17l5-5-5-5"/><path d="M21 12H9"/>
        </svg>
        Logout
      </a>
    </div>

    <div class="page">
      <div class="pc-main">
        <!-- LIVE PRICE TICKER -->
        <div class="pc-ticker-bar" id="pc-ticker-bar">
          <div class="pc-ticker-track" id="pc-ticker-track">
            <span class="pc-ticker-item"><span class="sym">Loading prices…</span></span>
          </div>
        </div>

        <!-- COMPACT HEADER ROW -->
        <div class="p2p-header-row">
          <div class="p2p-header-left">
            <h1 class="p2p-page-title">P2P Trading</h1>
            <p class="p2p-page-sub">Buy & sell crypto directly with other users &bull; 0 fees</p>
          </div>
          <div class="p2p-header-right">
            <a href="messages.html" class="p2p-header-link">💬 Messages</a>
            <a href="profile.html" class="p2p-header-link" onclick="event.preventDefault(); document.getElementById('orders-modal').style.display='flex';">🕐 My Orders</a>
          </div>
        </div>

        <!-- BUY/SELL FULL-WIDTH TOGGLE -->
        <div class="p2p-toggle-bar" id="p2p-toggle-bar">
          <button class="p2p-toggle-segment active" id="toggle-buy" onclick="setOrderType('buy')">Buy Crypto</button>
          <button class="p2p-toggle-segment" id="toggle-sell" onclick="setOrderType('sell')">Sell Crypto</button>
        </div>
        <!-- Keep old IDs for JS compatibility -->
        <div style="display:none;">
          <button id="tab-buy" class="tab"></button>
          <button id="tab-sell" class="tab"></button>
        </div>

        <!-- FILTER ROW 1: Coin tabs + Search + Express toggle -->
        <div class="p2p-filter-row">
          <div class="p2p-coin-tabs" id="p2p-coin-tabs">
            <button class="coin-tab active" data-crypto="USDT" id="tab-usdt" onclick="setCrypto('USDT')">USDT</button>
            <button class="coin-tab" data-crypto="BTC" id="tab-btc" onclick="setCrypto('BTC')">BTC</button>
            <button class="coin-tab" data-crypto="ETH" onclick="showToast('Coming soon', 'info')">ETH</button>
            <button class="coin-tab" data-crypto="BNB" onclick="showToast('Coming soon', 'info')">BNB</button>
            <button class="coin-tab" data-crypto="SOL" onclick="showToast('Coming soon', 'info')">SOL</button>
          </div>
          <div class="p2p-search-wrapper">
            <input type="text" id="p2p-search" placeholder="Search merchant..." oninput="filterListingsBySearch(this.value)" />
            <span class="input-suffix">🔍</span>
          </div>
          <label class="p2p-express-toggle">
            <input type="checkbox" id="p2p-express-filter" onchange="filterListingsDisplay()" />
            <span>Express (verified only)</span>
          </label>
        </div>

        <!-- FILTER ROW 2: Payment method pills -->
        <div class="p2p-payment-filter-row" id="p2p-payment-filter-row">
          <span class="p2p-filter-label">Payment:</span>
          <button class="pay-filter-pill active" data-method="all" onclick="setPaymentFilter('all')">All</button>
          <button class="pay-filter-pill" data-method="Bank Transfer" onclick="setPaymentFilter('Bank Transfer')">Bank Transfer</button>
          <button class="pay-filter-pill" data-method="Wise" onclick="setPaymentFilter('Wise')">Wise</button>
          <button class="pay-filter-pill" data-method="PayPal" onclick="setPaymentFilter('PayPal')">PayPal</button>
          <button class="pay-filter-pill" data-method="Cash App" onclick="setPaymentFilter('Cash App')">Cash App</button>
          <button class="pay-filter-pill" data-method="Revolut" onclick="setPaymentFilter('Revolut')">Revolut</button>
          <button class="pay-filter-pill" data-method="Zelle" onclick="setPaymentFilter('Zelle')">Zelle</button>
          <button class="pay-filter-pill" data-method="Apple Pay" onclick="setPaymentFilter('Apple Pay')">Apple Pay</button>
        </div>

        <!-- CURRENCY PICKER (inline) -->
        <div class="p2p-currency-picker" id="p2p-currency-picker" onclick="openCurrencyPicker()">
          <span id="selected-flag">🇪🇹</span>
          <span id="selected-currency">ETB</span>
          <span class="p2p-caret">▾</span>
        </div>

        <!-- AMOUNT FILTER -->
        <div class="p2p-amount-filter">
          <div class="input-row" style="margin:0; max-width:200px;">
            <input type="number" id="amount-filter" placeholder="Filter by amount" min="0" oninput="filterByAmount()" />
            <span class="input-suffix" id="amount-currency-label">ETB</span>
          </div>
        </div>

        <!-- LISTINGS TABLE -->
        <div id="listings-container" class="p2p-listings-table">
          <!-- listings render here -->
        </div>
      </div>
    </div>

    <!-- CURRENCY PICKER MODAL -->
    <div id="currency-modal" class="modal-overlay" style="display: none">
      <div class="modal-sheet">
        <div class="modal-header">
          <span class="modal-title">Select Currency</span>
          <span class="modal-close" onclick="closeCurrencyPicker()">✕</span>
        </div>
        <div class="input-row" style="margin: 0 16px 12px">
          <span class="input-suffix">🔍</span>
          <input
            type="text"
            id="currency-search"
            placeholder="Search currency..."
            oninput="renderCurrencyList()"
          />
        </div>
        <div id="currency-list" class="modal-list"></div>
      </div>
    </div>

    <!-- ORDERS MODAL (from profile.html) -->
    <div id="orders-modal" class="modal-overlay" style="display: none">
      <div class="modal-sheet">
        <div class="modal-header">
          <span class="modal-title">My Orders</span>
          <span class="modal-close" onclick="closeModal('orders-modal')">✕</span>
        </div>
        <div id="orders-list" class="modal-list" style="min-height: 200px;">
          <div style="text-align:center; padding: 40px; color: var(--text3);">No orders yet</div>
        </div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
      <button class="nav-item active" onclick="window.location.href='home.html'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10" />
        </svg>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" onclick="window.location.href='p2p.html'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 3L3 7l4 4" />
          <path d="M3 7h13a4 4 0 014 4v1" />
          <path d="M17 21l4-4-4-4" />
          <path d="M21 17H8a4 4 0 01-4-4v-1" />
        </svg>
        <span class="nav-label">P2P</span>
      </button>
      <button class="nav-item" onclick="window.location.href='portfolio.html'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5" />
          <path d="M11 5l4 4L21 3" />
        </svg>
        <span class="nav-label">Portfolio</span>
      </button>
      <button class="nav-item" onclick="window.location.href='markets.html'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18" />
          <path d="M18 17V9" />
          <path d="M13 17V5" />
          <path d="M8 17v-3" />
        </svg>
        <span class="nav-label">Markets</span>
      </button>
      <button class="nav-item" onclick="window.location.href='deposit.html'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v12" />
          <path d="M7 10l5 5 5-5" />
          <path d="M5 19h14" />
        </svg>
        <span class="nav-label">Deposit</span>
      </button>
      <button class="nav-item" onclick="window.location.href='messages.html'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
        </svg>
        <span class="nav-label">Messages</span>
      </button>
      <button class="nav-item" onclick="window.location.href='profile.html'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4" />
          <path d="M4 21c0-4 4-6 8-6s8 2 8 6" />
        </svg>
        <span class="nav-label">Profile</span>
      </button>
    </div>
    <div id="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script src="currencies.js"></script>
    <script src="listings.js"></script>
    <script src="p2p.js"></script>
  </body>
</html>
