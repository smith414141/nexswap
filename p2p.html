<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>CryptoSwap — P2P</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>

    <div class="page">
      <!-- TOP BAR -->
      <div class="top-bar">
        <div class="top-bar-logo">⚡ CryptoSwap</div>
        <div class="top-bar-right">
          <span class="kyc-badge none" id="kyc-badge">No KYC</span>
        </div>
      </div>

      <!-- P2P HEADER -->
      <div
        style="
          padding: 12px 16px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          border-bottom: 1px solid var(--border);
        "
      >
        <div class="tabs" style="width: 140px">
          <button class="tab active" id="tab-buy" onclick="setOrderType('buy')">
            Buy
          </button>
          <button class="tab" id="tab-sell" onclick="setOrderType('sell')">
            Sell
          </button>
        </div>

        <div
          style="display: flex; align-items: center; gap: 6px; cursor: pointer"
          onclick="openCurrencyPicker()"
        >
          <span style="font-size: 18px" id="selected-flag">🇪🇹</span>
          <span style="font-weight: 700; font-size: 14px" id="selected-currency"
            >ETB</span
          >
          <span style="color: var(--text2); font-size: 14px">▾</span>
        </div>
      </div>

      <!-- CRYPTO SELECTOR -->
      <div style="padding: 12px 16px 0; display: flex; gap: 8px">
        <button
          class="crypto-pill active"
          id="tab-usdt"
          onclick="setCrypto('USDT')"
        >
          <span
            class="coin-icon usdt"
            style="width: 22px; height: 22px; font-size: 12px"
            >₮</span
          >
          USDT
        </button>
        <button class="crypto-pill" id="tab-btc" onclick="setCrypto('BTC')">
          <span
            class="coin-icon btc"
            style="width: 22px; height: 22px; font-size: 12px"
            >₿</span
          >
          BTC
        </button>
      </div>

      <!-- AMOUNT FILTER -->
      <div style="padding: 12px 16px">
        <div class="input-row" style="margin: 0">
          <span class="input-suffix">Amount</span>
          <input
            type="number"
            id="amount-filter"
            placeholder="0"
            min="0"
            oninput="filterByAmount()"
          />
          <span class="input-suffix" id="amount-currency-label">ETB</span>
        </div>
      </div>

      <!-- LISTINGS -->
      <div id="listings-container">
        <!-- listings render here -->
      </div>
    </div>

    <!-- CURRENCY PICKER MODAL -->
    <div id="currency-modal" class="modal-overlay" style="display: none">
      <div class="modal-sheet">
        <div class="modal-header">
          <span class="modal-title">Select Currency</span>
          <span class="modal-close" onclick="closeCurrencyPicker()">✕</span>
        </div>
        <div class="input-row" style="margin: 0 16px 12px">
          <span class="input-suffix">🔍</span>
          <input
            type="text"
            id="currency-search"
            placeholder="Search currency..."
            oninput="renderCurrencyList()"
          />
        </div>
        <div id="currency-list" class="modal-list"></div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
      <button class="nav-item" onclick="window.location.href='home.html'">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item active" onclick="window.location.href='p2p.html'">
        <span class="nav-icon">🔄</span>
        <span class="nav-label">P2P</span>
      </button>
      <button class="nav-item" onclick="window.location.href='deposit.html'">
        <span class="nav-icon">⬇️</span>
        <span class="nav-label">Deposit</span>
      </button>
      <button class="nav-item" onclick="window.location.href='withdraw.html'">
        <span class="nav-icon">⬆️</span>
        <span class="nav-label">Withdraw</span>
      </button>
      <button class="nav-item" onclick="window.location.href='profile.html'">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
      </button>
    </div>

    <div id="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script src="currencies.js"></script>
    <script src="listings.js"></script>
    <script src="p2p.js"></script>
  </body>
</html>
