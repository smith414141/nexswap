<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kripex Live</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .stream-page {
        min-height: 100vh;
        background: var(--bg);
        display: flex;
        flex-direction: column;
      }
      .stream-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 24px;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
      }
      .stream-nav-logo {
        font-size: 18px;
        font-weight: 700;
        color: var(--blue);
      }
      .live-badge {
        background: var(--red);
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 4px;
        letter-spacing: 0.05em;
      }
      .stream-body {
        display: flex;
        flex: 1;
        height: calc(100vh - 57px);
      }
      .stream-main {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      #jitsi-container {
        flex: 1;
        width: 100%;
        min-height: 500px;
      }
      .stream-sidebar {
        width: 280px;
        background: var(--bg2);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 16px;
        gap: 12px;
        overflow-y: auto;
      }
      .stream-sidebar h3 {
        font-size: 13px;
        font-weight: 700;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }
      .channel-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .channel-item:hover {
        background: var(--bg3);
      }
      .channel-item.active {
        background: rgba(61, 124, 255, 0.12);
      }
      .channel-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        flex-shrink: 0;
      }
      .channel-dot.offline {
        background: var(--text3);
      }
      .channel-info {
        flex: 1;
      }
      .channel-name {
        font-size: 13px;
        font-weight: 600;
      }
      .channel-viewers {
        font-size: 11px;
        color: var(--text3);
      }
    </style>
  </head>
  <body>
    <div class="stream-page">
      <nav class="stream-nav">
        <div class="stream-nav-logo">⚡ Kripex Live</div>
        <span class="live-badge">● LIVE</span>
        <a
          href="home.html"
          style="color: var(--text2); font-size: 13px; text-decoration: none"
          >← Back to Exchange</a
        >
      </nav>

      <div class="stream-body">
        <div class="stream-main">
          <div id="jitsi-container"></div>
        </div>

        <div class="stream-sidebar">
          <h3>Live Channels</h3>
          <div
            class="channel-item active"
            onclick="joinRoom('kripex-btc-analysis')"
          >
            <div class="channel-dot"></div>
            <div class="channel-info">
              <div class="channel-name">BTC Analysis</div>
              <div class="channel-viewers">🔴 142 watching</div>
            </div>
          </div>
          <div class="channel-item" onclick="joinRoom('kripex-market-talk')">
            <div class="channel-dot"></div>
            <div class="channel-info">
              <div class="channel-name">Market Talk</div>
              <div class="channel-viewers">🔴 89 watching</div>
            </div>
          </div>
          <div class="channel-item" onclick="joinRoom('kripex-eth-deep-dive')">
            <div class="channel-dot"></div>
            <div class="channel-info">
              <div class="channel-name">ETH Deep Dive</div>
              <div class="channel-viewers">🔴 57 watching</div>
            </div>
          </div>
          <div class="channel-item" onclick="joinRoom('kripex-p2p-tips')">
            <div class="channel-dot offline"></div>
            <div class="channel-info">
              <div class="channel-name">P2P Tips</div>
              <div class="channel-viewers">Offline</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://meet.jit.si/external_api.js"></script>
    <script>
      let currentApi = null;

      function joinRoom(roomName) {
        // Clean up previous room
        if (currentApi) {
          currentApi.dispose();
          currentApi = null;
        }

        // Update active channel highlight
        document
          .querySelectorAll(".channel-item")
          .forEach((el) => el.classList.remove("active"));
        event.currentTarget.classList.add("active");

        // Launch Jitsi in the container
        currentApi = new JitsiMeetExternalAPI("meet.jit.si", {
          roomName: roomName,
          parentNode: document.getElementById("jitsi-container"),
          width: "100%",
          height: "100%",
          configOverwrite: {
            startWithAudioMuted: true,
            startWithVideoMuted: false,
            prejoinPageEnabled: false,
          },
          interfaceConfigOverwrite: {
            SHOW_JITSI_WATERMARK: false,
            SHOW_WATERMARK_FOR_GUESTS: false,
            TOOLBAR_BUTTONS: [
              "microphone",
              "camera",
              "desktop",
              "fullscreen",
              "hangup",
              "chat",
              "raisehand",
              "tileview",
            ],
          },
        });
      }

      // Auto-join the first channel on page load
      window.onload = () => {
        currentApi = new JitsiMeetExternalAPI("meet.jit.si", {
          roomName: "kripex-btc-analysis",
          parentNode: document.getElementById("jitsi-container"),
          width: "100%",
          height: "100%",
          configOverwrite: {
            startWithAudioMuted: true,
            prejoinPageEnabled: false,
          },
          interfaceConfigOverwrite: {
            SHOW_JITSI_WATERMARK: false,
            SHOW_WATERMARK_FOR_GUESTS: false,
            TOOLBAR_BUTTONS: [
              "microphone",
              "camera",
              "desktop",
              "fullscreen",
              "hangup",
              "chat",
              "raisehand",
              "tileview",
            ],
          },
        });
      };
    </script>
  </body>
</html>
