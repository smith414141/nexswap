<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CryptoSwap — Buy & Sell Crypto P2P</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>

    <div class="auth-wrapper">
      <!-- LOGO -->
      <div class="auth-logo">
        <div class="logo-icon">⚡</div>
        <span>CryptoSwap</span>
      </div>

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">
          Login
        </button>
        <button class="auth-tab" onclick="switchTab('register')">
          Register
        </button>
      </div>

      <!-- LOGIN FORM -->
      <div id="login-form" class="auth-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="Enter your email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="login-password"
            placeholder="Enter your password"
          />
        </div>
        <button class="btn-primary" onclick="login()">Login</button>
        <p class="auth-link" onclick="switchTab('register')">
          Don't have an account? <span>Register</span>
        </p>
        <p
          class="auth-link"
          onclick="forgotPassword()"
          style="margin-top: -4px"
        >
          Forgot password? <span>Reset</span>
        </p>
      </div>

      <!-- REGISTER FORM -->
      <div id="register-form" class="auth-form" style="display: none">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Enter your full name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="Enter your email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="reg-password"
            placeholder="Min 6 characters"
          />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="reg-phone" placeholder="+251 9XX XXX XXX" />
        </div>
        <button class="btn-primary" onclick="register()">Create Account</button>
        <p class="auth-link" onclick="switchTab('login')">
          Already have an account? <span>Login</span>
        </p>
      </div>

      <!-- TRUST BADGES -->
      <div class="trust-badges">
        <div class="trust-badge">🔒 Secure</div>
        <div class="trust-badge">⚡ Fast</div>
        <div class="trust-badge">✅ Verified</div>
        <div class="trust-badge">🌍 Global</div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast-container"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
  </body>
</html>
