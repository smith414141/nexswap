<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coin Detail — Kripex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="coin.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <!-- TOP BAR -->
    <div class="top-bar">
      <span style="font-size:20px;cursor:pointer" onclick="goBack()">←</span>
      <div class="top-bar-logo">Coin Detail</div>
      <span style="width:20px"></span>
    </div>

    <div class="section-padding">
      <!-- COIN HEADER -->
      <div class="flex-between" style="margin-bottom:20px;">
        <div class="flex-between" style="gap:12px;">
          <div id="coin-icon" class="coin-icon" style="width:48px;height:48px;font-size:24px;"></div>
          <div class="flex-col">
            <div id="coin-name" style="font-size:18px;font-weight:900;">Loading...</div>
            <div id="coin-symbol" class="text-muted" style="font-size:13px;"></div>
          </div>
        </div>
        <button
          id="fav-toggle"
          class="btn btn-secondary"
          style="padding:8px 12px;font-size:12px;"
          onclick="toggleCoinFavorite()"
        >
          ☆ Save
        </button>
      </div>

      <!-- PRICE -->
      <div class="card" style="margin-bottom:20px;">
        <div id="coin-price" class="balance-total text-mono" style="font-size:32px;">$0.00</div>
        <div id="coin-change" class="text-mono" style="font-weight:700;">--</div>
      </div>

      <!-- STATS -->
      <div class="card" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div class="flex-col">
          <div class="section-title" style="margin-bottom:4px;">Market Cap</div>
          <div id="stat-market-cap" class="text-mono" style="font-weight:600;">--</div>
        </div>
        <div class="flex-col">
          <div class="section-title" style="margin-bottom:4px;">24h Volume</div>
          <div id="stat-volume" class="text-mono" style="font-weight:600;">--</div>
        </div>
        <div class="flex-col">
          <div class="section-title" style="margin-bottom:4px;">24h High</div>
          <div id="stat-high" class="text-mono" style="font-weight:600;">--</div>
        </div>
        <div class="flex-col">
          <div class="section-title" style="margin-bottom:4px;">24h Low</div>
          <div id="stat-low" class="text-mono" style="font-weight:600;">--</div>
        </div>
      </div>

      <!-- ACTIONS -->
      <div style="margin-top:24px;">
        <a id="buy-btn" href="trade.html" class="btn btn-primary" style="display:block;text-align:center;text-decoration:none;">
          Trade Now
        </a>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="coin.js"></script>
  </body>
</html>
