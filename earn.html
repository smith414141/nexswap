<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Earn — Kripex</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <div class="page" style="padding-bottom: 24px">
      <div class="top-bar">
        <span style="font-size: 20px; cursor: pointer" onclick="goBack()"
          >←</span
        >
        <div class="top-bar-logo">Earn</div>
        <span style="width: 20px"></span>
      </div>

      <!-- HERO -->
      <div
        style="
          background: var(--bg2);
          border-bottom: 1px solid var(--border);
          padding: 20px 16px;
          text-align: center;
          margin-bottom: 16px;
        "
      >
        <div style="font-size: 11px; color: var(--text3); margin-bottom: 4px">
          Best Available APY
        </div>
        <div style="font-size: 36px; font-weight: 900; color: var(--green)">
          Up to 8%
        </div>
        <div style="font-size: 12px; color: var(--text2); margin-top: 4px">
          Earn rewards on your idle crypto
        </div>
      </div>

      <div style="padding: 0 16px">
        <div class="tabs" style="margin-bottom: 16px">
          <button class="tab active" onclick="switchEarnTab('products', this)">
            Products
          </button>
          <button class="tab" onclick="switchEarnTab('positions', this)">
            My Positions
          </button>
        </div>

        <div id="earn-products">
          <div id="earn-products-list"></div>
        </div>

        <div id="earn-positions" style="display: none">
          <div id="earn-positions-list">
            <div class="empty-state">Loading...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- STAKE MODAL -->
    <div id="stake-modal" class="modal-overlay" style="display: none">
      <div class="modal-sheet">
        <div class="modal-header">
          <span class="modal-title" id="stake-modal-title">Stake</span>
          <span class="modal-close" onclick="closeStakeModal()">✕</span>
        </div>
        <div style="padding: 16px">
          <div style="text-align: center; margin-bottom: 16px">
            <div
              style="font-size: 24px; font-weight: 900; color: var(--green)"
              id="stake-apy"
            >
              0% APY
            </div>
            <div
              style="font-size: 11px; color: var(--text3)"
              id="stake-balance"
            >
              Available: --
            </div>
          </div>
          <div class="form-group">
            <label>Amount to Stake</label>
            <input type="number" id="stake-amount" placeholder="0.00" min="0" />
          </div>
          <button id="stake-btn" class="btn-primary" onclick="submitStake()">
            Confirm Stake
          </button>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script src="wallet.js"></script>
    <script src="earn.js"></script>
  </body>
</html>
