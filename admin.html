<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>CryptoSwap — Admin</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>

    <!-- ADMIN LOGIN -->
    <div id="admin-login" class="verify-wrapper" style="display: flex">
      <div
        class="auth-logo"
        style="margin-bottom: 24px; justify-content: center"
      >
        <div class="logo-icon">🛡️</div>
        <span>Admin Panel</span>
      </div>
      <div style="width: 100%; max-width: 340px">
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            id="admin-email"
            placeholder="admin@example.com"
          />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="admin-password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" onclick="adminLogin()">Login</button>
      </div>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div
      id="admin-dashboard"
      style="display: none; max-width: 600px; margin: 0 auto"
    >
      <div class="top-bar">
        <div class="top-bar-logo">🛡️ Admin</div>
        <button
          class="btn-secondary"
          style="width: auto; margin: 0; padding: 8px 16px; font-size: 12px"
          onclick="adminLogout()"
        >
          Logout
        </button>
      </div>

      <div class="admin-tabs">
        <button
          class="filter-tab active"
          onclick="switchAdminTab('dashboard', this)"
        >
          Dashboard
        </button>
        <button class="filter-tab" onclick="switchAdminTab('kyc', this)">
          KYC
        </button>
        <button class="filter-tab" onclick="switchAdminTab('merchants', this)">
          Merchants
        </button>
        <button
          class="filter-tab"
          onclick="switchAdminTab('withdrawals', this)"
        >
          Withdrawals
        </button>
        <button class="filter-tab" onclick="switchAdminTab('wallets', this)">
          Wallets
        </button>
        <button class="filter-tab" onclick="switchAdminTab('p2p', this)">
          P2P Orders
        </button>
        <button class="filter-tab" onclick="switchAdminTab('users', this)">
          Users
        </button>
        <button class="filter-tab" onclick="switchAdminTab('admins', this)">
          Admins
        </button>
      </div>

      <!-- DASHBOARD -->
      <div id="tab-dashboard" class="admin-tab-content">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px">
          <div class="card">
            <div style="font-size: 11px; color: var(--text2)">Pending KYC</div>
            <div style="font-size: 24px; font-weight: 900" id="stat-kyc">
              --
            </div>
          </div>
          <div class="card">
            <div style="font-size: 11px; color: var(--text2)">
              Pending Merchants
            </div>
            <div style="font-size: 24px; font-weight: 900" id="stat-merchants">
              --
            </div>
          </div>
          <div class="card">
            <div style="font-size: 11px; color: var(--text2)">
              Pending Withdrawals
            </div>
            <div
              style="font-size: 24px; font-weight: 900"
              id="stat-withdrawals"
            >
              --
            </div>
          </div>
          <div class="card">
            <div style="font-size: 11px; color: var(--text2)">
              Active P2P Orders
            </div>
            <div style="font-size: 24px; font-weight: 900" id="stat-p2p">
              --
            </div>
          </div>
          <div class="card">
            <div style="font-size: 11px; color: var(--text2)">
              Disputed Orders
            </div>
            <div style="font-size: 24px; font-weight: 900" id="stat-disputed">
              --
            </div>
          </div>
          <div class="card">
            <div style="font-size: 11px; color: var(--text2)">Total Users</div>
            <div style="font-size: 24px; font-weight: 900" id="stat-users">
              --
            </div>
          </div>
        </div>
        <button
          class="btn-secondary"
          style="margin-top: 16px"
          onclick="loadDashboardStats()"
        >
          🔄 Refresh Stats
        </button>
      </div>

      <!-- KYC -->
      <div id="tab-kyc" class="admin-tab-content" style="display: none">
        <div class="tabs" style="margin-bottom: 12px">
          <button class="tab active" onclick="loadKycList('pending', this)">
            Pending
          </button>
          <button class="tab" onclick="loadKycList('approved', this)">
            Approved
          </button>
          <button class="tab" onclick="loadKycList('rejected', this)">
            Rejected
          </button>
        </div>
        <div id="kyc-list"><div class="empty-state">Loading...</div></div>
      </div>

      <!-- MERCHANTS -->
      <div id="tab-merchants" class="admin-tab-content" style="display: none">
        <div class="tabs" style="margin-bottom: 12px">
          <button
            class="tab active"
            onclick="loadMerchantList('pending', this)"
          >
            Pending
          </button>
          <button class="tab" onclick="loadMerchantList('approved', this)">
            Approved
          </button>
          <button class="tab" onclick="loadMerchantList('rejected', this)">
            Rejected
          </button>
        </div>
        <div id="merchant-list"><div class="empty-state">Loading...</div></div>
      </div>

      <!-- WITHDRAWALS -->
      <div id="tab-withdrawals" class="admin-tab-content" style="display: none">
        <div class="tabs" style="margin-bottom: 12px">
          <button
            class="tab active"
            onclick="loadWithdrawalsList('pending', this)"
          >
            Pending
          </button>
          <button class="tab" onclick="loadWithdrawalsList('completed', this)">
            Completed
          </button>
          <button class="tab" onclick="loadWithdrawalsList('rejected', this)">
            Rejected
          </button>
        </div>
        <div id="withdrawals-list">
          <div class="empty-state">Loading...</div>
        </div>
      </div>

      <!-- WALLETS -->
      <div id="tab-wallets" class="admin-tab-content" style="display: none">
        <div class="card" style="margin-bottom: 16px">
          <p class="section-title">Search User by Email</p>
          <div class="input-row">
            <input
              type="text"
              id="wallet-search-email"
              placeholder="user@email.com"
            />
          </div>
          <button class="btn-primary" onclick="searchUserWallet()">
            Search
          </button>
        </div>
        <div id="wallet-result"></div>
      </div>

      <!-- P2P ORDERS -->
      <div id="tab-p2p" class="admin-tab-content" style="display: none">
        <div class="tabs" style="margin-bottom: 12px">
          <button class="tab active" onclick="loadP2pOrders('active', this)">
            Active
          </button>
          <button class="tab" onclick="loadP2pOrders('disputed', this)">
            Disputed
          </button>
          <button class="tab" onclick="loadP2pOrders('completed', this)">
            Completed
          </button>
          <button class="tab" onclick="loadP2pOrders('cancelled', this)">
            Cancelled
          </button>
        </div>
        <div id="p2p-list"><div class="empty-state">Loading...</div></div>
      </div>

      <!-- USERS -->
      <div id="tab-users" class="admin-tab-content" style="display: none">
        <div class="input-row" style="margin-bottom: 12px">
          <input
            type="text"
            id="user-search"
            placeholder="Search by email..."
            oninput="filterUsersList()"
          />
        </div>
        <div id="users-list"><div class="empty-state">Loading...</div></div>
      </div>

      <!-- ADMINS -->
      <div id="tab-admins" class="admin-tab-content" style="display: none">
        <div class="card" style="margin-bottom: 16px">
          <p class="section-title">Add New Admin</p>
          <div class="input-row">
            <input
              type="email"
              id="new-admin-email"
              placeholder="newadmin@email.com"
            />
          </div>
          <button class="btn-primary" onclick="addAdmin()">Add Admin</button>
        </div>
        <div id="admins-list"><div class="empty-state">Loading...</div></div>
      </div>
    </div>

    <!-- USER DETAIL MODAL -->
    <div id="user-detail-modal" class="modal-overlay" style="display: none">
      <div class="modal-sheet" style="max-height: 85vh">
        <div class="modal-header">
          <span class="modal-title">User Details</span>
          <span class="modal-close" onclick="closeModal('user-detail-modal')"
            >✕</span
          >
        </div>
        <div
          style="padding: 16px; overflow-y: auto"
          id="user-detail-content"
        ></div>
      </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
