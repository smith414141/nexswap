<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Kripex — Messages</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <!-- PC NAV -->
    <div class="pc-nav">
      <a class="pc-nav-logo" href="home.html" style="text-decoration: none"
        ><span class="logo-icon-mini">K</span>Kripex</a
      >
      <div class="pc-nav-right">
        <span class="kyc-badge" id="kyc-badge-pc" style="display: none"></span>
        <a href="messages.html" class="nav-icon-btn" title="Messages">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
          </svg>
        </a>
        <a href="profile.html" class="nav-icon-btn" title="Profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <circle cx="12" cy="8" r="4" /><path d="M4 21c0-4 4-6 8-6s8 2 8 6" />
          </svg>
        </a>
        <button class="btn-logout" onclick="logoutUser()">Logout</button>
      </div>
    </div>

    <div class="pc-sidebar">
      <div class="pc-sidebar-group-label">Main</div>
      <a class="pc-sidebar-link " href="home.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1.5" /><rect x="14" y="3" width="7" height="7" rx="1.5" />
          <rect x="3" y="14" width="7" height="7" rx="1.5" /><rect x="14" y="14" width="7" height="7" rx="1.5" />
        </svg>
        Dashboard
      </a>
      <a class="pc-sidebar-link " href="markets.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20V10M12 20V4M20 20v-7" /></svg>
        Markets
      </a>
      <a class="pc-sidebar-link " href="trade.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M7 3L3 7l4 4" /><path d="M3 7h13a4 4 0 014 4v1" /><path d="M17 21l4-4-4-4" /><path d="M21 17H8a4 4 0 01-4-4v-1" />
        </svg>
        Trade
      </a>
      <a class="pc-sidebar-link " href="wallet.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="6" width="20" height="14" rx="2" /><path d="M2 10h20" /><circle cx="17" cy="15" r="1.4" fill="currentColor" stroke="none" />
        </svg>
        Wallet
      </a>
      <a class="pc-sidebar-link " href="portfolio.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1010 10H12V2z" /><path d="M21 8A8.99 8.99 0 0014 2v6h7z" /></svg>
        Portfolio
      </a>
      <div class="pc-sidebar-group-label">Discover</div>
      <a class="pc-sidebar-link " href="p2p.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="7" r="4" /><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2" /><path d="M16 3.13a4 4 0 010 7.75" /><path d="M21 21v-2a4 4 0 00-3-3.87" />
        </svg>
        P2P Trading
      </a>
      <a class="pc-sidebar-link " href="earn.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8" /><path d="M17 7h4v4" /></svg>
        Earn
      </a>
      <a class="pc-sidebar-link " href="products.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="12" r="1.5" fill="currentColor" /><circle cx="12" cy="12" r="1.5" fill="currentColor" /><circle cx="19" cy="12" r="1.5" fill="currentColor" /></svg>
        More
      </a>
      <div class="pc-sidebar-spacer"></div>
      <a class="pc-sidebar-link pc-sidebar-logout" href="#" onclick="logoutUser();return false;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" /><path d="M16 17l5-5-5-5" /><path d="M21 12H9" /></svg>
        Logout
      </a>
    </div>

    <div class="page">
      <div class="pc-main">
        <div class="section-padding">
          <p class="section-title">Messages</p>
          <div class="tabs" style="margin-bottom: 16px">
            <button class="tab active" onclick="switchMsgTab('support', this)">Support</button>
            <button class="tab" onclick="switchMsgTab('announcements', this)">Announcements</button>
          </div>

          <!-- SUPPORT CHAT -->
          <div id="msg-support" class="card" style="height: 60vh; display: flex; flex-direction: column;">
            <div class="chat-messages" id="msg-support-messages" style="flex: 1; overflow-y: auto;"></div>
            <div style="border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px;">
              <div class="chat-input-row" style="margin-bottom: 8px;">
                <input type="text" id="msg-support-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMsgSupport()" />
                <button class="chat-send-btn" onclick="sendMsgSupport()">➤</button>
              </div>
              <label style="font-size:12px; cursor:pointer; color:var(--blue);">
                📎 Attach Image
                <input type="file" id="msg-image-input" accept="image/*" style="display: none" onchange="sendMsgImage()" />
              </label>
            </div>
          </div>

          <!-- ANNOUNCEMENTS -->
          <div id="msg-announcements" style="display: none">
            <div id="announcements-list">
              <div class="empty-state">Loading...</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
      <button class="nav-item" onclick="window.location.href='home.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10"
          />
        </svg>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" onclick="window.location.href='p2p.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M7 3L3 7l4 4" />
          <path d="M3 7h13a4 4 0 014 4v1" />
          <path d="M17 21l4-4-4-4" />
          <path d="M21 17H8a4 4 0 01-4-4v-1" />
        </svg>
        <span class="nav-label">P2P</span>
      </button>
      <button class="nav-item" onclick="window.location.href='portfolio.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5" />
          <path d="M11 5l4 4L21 3" />
        </svg>
        <span class="nav-label">Portfolio</span>
      </button>
      <button class="nav-item" onclick="window.location.href='markets.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 3v18h18" />
          <path d="M18 17V9" />
          <path d="M13 17V5" />
          <path d="M8 17v-3" />
        </svg>
        <span class="nav-label">Markets</span>
      </button>
      <button class="nav-item" onclick="window.location.href='wallet.html?action=deposit'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 3v12" />
          <path d="M7 10l5 5 5-5" />
          <path d="M5 19h14" />
        </svg>
        <span class="nav-label">Deposit</span>
      </button>
      <button class="nav-item" onclick="window.location.href='wallet.html?action=withdraw'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 19V7" />
          <path d="M7 12l5-5 5 5" />
          <path d="M5 19h14" />
        </svg>
        <span class="nav-label">Withdraw</span>
      </button>
      <button
        class="nav-item active"
        onclick="window.location.href='messages.html'"
      >
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
        </svg>
        <span class="nav-label">Messages</span>
      </button>
    </div>

    <div id="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script src="messages.js"></script>
  </body>
</html>
