<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spot Trading — Kripex</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="trade.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <!-- PC NAV -->
    <div class="pc-nav">
      <a class="pc-nav-logo" href="home.html" style="text-decoration: none"
        ><span class="logo-icon-mini">K</span>Kripex</a
      >
      <div class="pc-nav-right">
        <span class="kyc-badge" id="kyc-badge-pc" style="display: none"></span>
        <a href="messages.html" class="nav-icon-btn" title="Messages">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
          </svg>
        </a>
        <a href="profile.html" class="nav-icon-btn" title="Profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <circle cx="12" cy="8" r="4" /><path d="M4 21c0-4 4-6 8-6s8 2 8 6" />
          </svg>
        </a>
        <button class="btn-logout" onclick="logoutUser()">Logout</button>
      </div>
    </div>

    <div class="pc-sidebar">
      <div class="pc-sidebar-group-label">Main</div>
      <a class="pc-sidebar-link " href="home.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1.5" /><rect x="14" y="3" width="7" height="7" rx="1.5" />
          <rect x="3" y="14" width="7" height="7" rx="1.5" /><rect x="14" y="14" width="7" height="7" rx="1.5" />
        </svg>
        Dashboard
      </a>
      <a class="pc-sidebar-link " href="markets.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20V10M12 20V4M20 20v-7" /></svg>
        Markets
      </a>
      <a class="pc-sidebar-link active" href="trade.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M7 3L3 7l4 4" /><path d="M3 7h13a4 4 0 014 4v1" /><path d="M17 21l4-4-4-4" /><path d="M21 17H8a4 4 0 01-4-4v-1" />
        </svg>
        Trade
      </a>
      <a class="pc-sidebar-link " href="wallet.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="6" width="20" height="14" rx="2" /><path d="M2 10h20" /><circle cx="17" cy="15" r="1.4" fill="currentColor" stroke="none" />
        </svg>
        Wallet
      </a>
      <a class="pc-sidebar-link " href="portfolio.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1010 10H12V2z" /><path d="M21 8A8.99 8.99 0 0014 2v6h7z" /></svg>
        Portfolio
      </a>
      <div class="pc-sidebar-group-label">Discover</div>
      <a class="pc-sidebar-link " href="p2p.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="7" r="4" /><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2" /><path d="M16 3.13a4 4 0 010 7.75" /><path d="M21 21v-2a4 4 0 00-3-3.87" />
        </svg>
        P2P Trading
      </a>
      <a class="pc-sidebar-link " href="earn.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8" /><path d="M17 7h4v4" /></svg>
        Earn
      </a>
      <a class="pc-sidebar-link " href="products.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="12" r="1.5" fill="currentColor" /><circle cx="12" cy="12" r="1.5" fill="currentColor" /><circle cx="19" cy="12" r="1.5" fill="currentColor" /></svg>
        More
      </a>
      <div class="pc-sidebar-spacer"></div>
      <a class="pc-sidebar-link pc-sidebar-logout" href="#" onclick="logoutUser();return false;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" /><path d="M16 17l5-5-5-5" /><path d="M21 12H9" /></svg>
        Logout
      </a>
    </div>
<div class="pc-main">


    <div class="page" style="padding-bottom:0">

      <!-- TOP BAR -->
      <div class="top-bar">
        <span style="font-size:20px;cursor:pointer" onclick="goBack()">←</span>
        <div class="flex-col" style="align-items:center;">
          <span id="trade-pair" style="font-weight:900;font-size:16px;">BTC/USDT</span>
          <span id="trade-price" style="font-size:12px;font-weight:700;color:var(--green);">--</span>
        </div>
        <span style="width:20px"></span>
      </div>

      <!-- PAIR PILLS -->
      <div style="display:flex;gap:6px;padding:12px;overflow-x:auto;border-bottom:1px solid var(--border);">
        <button id="pill-BTCUSDT" class="crypto-pill active" onclick="setPair('BTCUSDT')">BTC</button>
        <button id="pill-ETHUSDT" class="crypto-pill" onclick="setPair('ETHUSDT')">ETH</button>
        <button id="pill-SOLUSDT" class="crypto-pill" onclick="setPair('SOLUSDT')">SOL</button>
        <button id="pill-BNBUSDT" class="crypto-pill" onclick="setPair('BNBUSDT')">BNB</button>
        <button id="pill-XRPUSDT" class="crypto-pill" onclick="setPair('XRPUSDT')">XRP</button>
        <button id="pill-DOGEUSDT" class="crypto-pill" onclick="setPair('DOGEUSDT')">DOGE</button>
      </div>

      <div class="trade-grid" style="display: grid; grid-template-columns: 1fr 380px; gap: 24px; padding: 24px;">
        <!-- CHART -->
        <div class="trade-chart-wrap" style="background: var(--bg2); border-radius: 16px; padding: 20px; border: 1px solid var(--border);">
          <div id="tradingview-widget" style="height: 500px; border-radius: 12px; overflow: hidden;"></div>
        </div>

        <!-- SIDEBAR -->
        <div class="trade-sidebar">
          <!-- TRADE FORM -->
          <div class="card" style="border-radius: 20px;">
            <div class="tabs" style="margin-bottom: 24px;">
              <button class="tab active" onclick="switchOrderType('limit',this)">Limit</button>
              <button class="tab" onclick="switchOrderType('market',this)">Market</button>
            </div>
            
            <div class="form-group">
              <label>Price (USDT)</label>
              <input type="number" id="trade-price-input" placeholder="0.00" style="background: var(--bg);"/>
            </div>
            <div class="form-group">
              <label>Amount</label>
              <input type="number" id="trade-amount-input" placeholder="0.00" style="background: var(--bg);"/>
            </div>
            
            <div style="display:flex;gap:12px; margin-top: 24px;">
              <button id="buy-btn" class="btn btn-primary" style="flex:1;background:var(--green);color:#fff; border-radius: 12px;" onclick="placeOrder('buy')">Buy</button>
              <button id="sell-btn" class="btn btn-primary" style="flex:1;background:var(--red);color:#fff; border-radius: 12px;" onclick="placeOrder('sell')">Sell</button>
            </div>
          </div>
          
          <!-- ORDER BOOK -->
          <div class="card" style="margin-top: 24px; border-radius: 20px;">
             <p class="section-title">Order Book</p>
             <!-- Order book content would be here -->
          </div>
        </div>
      </div>

          <!-- REGION LOCK -->
          <div id="region-lock-message" style="display:none;background:rgba(246,70,93,0.1);border:1px solid var(--red);border-radius:8px;padding:10px;margin-top:8px;text-align:center;font-size:12px;color:var(--red);">
            ⚠️ Futures & Margin are restricted in your region. Change region in Settings.
          </div>

          <!-- TRADE HISTORY -->
          <div style="margin-top:10px;">
            <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;">Recent Trades</div>
            <div id="trade-history-list"><div style="font-size:11px;color:var(--text3);">No trades yet.</div></div>
          </div>
        </div>

    
</div>
<div id="toast-container"></div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script src="wallet.js"></script>
    <script src="trade.js"></script>
  </body>
</html>
