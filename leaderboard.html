  <body>

    <!-- PC NAV -->

            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
          </svg>

        <a href="profile.html" class="nav-icon-btn" title="Profile">

          </svg>

    <div class="pc-sidebar">
      <div class="pc-sidebar-group-label">Main</div>
      <a class="pc-sidebar-link " href="home.html">

          <rect x="3" y="3" width="7" height="7" rx="1.5" /><rect x="14" y="3" width="7" height="7" rx="1.5" />
          <rect x="3" y="14" width="7" height="7" rx="1.5" /><rect x="14" y="14" width="7" height="7" rx="1.5" />
        </svg>
        Dashboard
      </a>
      <a class="pc-sidebar-link " href="markets.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20V10M12 20V4M20 20v-7" /></svg>
        Markets
      </a>
      <a class="pc-sidebar-link " href="trade.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M7 3L3 7l4 4" /><path d="M3 7h13a4 4 0 014 4v1" /><path d="M17 21l4-4-4-4" /><path d="M21 17H8a4 4 0 01-4-4v-1" />
        </svg>
        Trade
      </a>
      <a class="pc-sidebar-link " href="wallet.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="6" width="20" height="14" rx="2" /><path d="M2 10h20" /><circle cx="17" cy="15" r="1.4" fill="currentColor" stroke="none" />
        </svg>
        Wallet

      <a class="pc-sidebar-link " href="portfolio.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1010 10H12V2z" /><path d="M21 8A8.99 8.99 0 0014 2v6h7z" /></svg>

          <circle cx="9" cy="7" r="4" /><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2" /><path d="M16 3.13a4 4 0 010 7.75" /><path d="M21 21v-2a4 4 0 00-3-3.87" />
        </svg>

        Earn

      <a class="pc-sidebar-link " href="products.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="12" r="1.5" fill="currentColor" /><circle cx="12" cy="12" r="1.5" fill="currentColor" /><circle cx="19" cy="12" r="1.5" fill="currentColor" /></svg>
        More

        Logout

    </div>
<div class="pc-main">


    <div class="page" style="padding-bottom:40px">
      <div class="top-bar">
        <span style="font-size:20px;cursor:pointer" onclick="goBack()">←</span>
        <div class="top-bar-logo">🏆 Leaderboard</div>
        <span style="width:20px"></span>
      </div>
      <div style="padding:16px">
        <div class="tabs" style="margin-bottom:16px">
          <button class="tab active" onclick="switchTab('volume',this)">Volume</button>
          <button class="tab" onclick="switchTab('trades',this)">Trades</button>
          <button class="tab" onclick="switchTab('referrals',this)">Referrals</button>
        </div>
        <!-- MY RANK -->
        <div id="my-rank-card" class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:16px;border:1px solid var(--blue);">
          <div style="font-size:22px;font-weight:900;color:var(--blue);width:36px;text-align:center;" id="my-rank-num">--</div>
          <div style="width:36px;height:36px;border-radius:50%;background:var(--blue);color:#0b0e11;display:flex;align-items:center;justify-content:center;font-weight:900;">Me</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700;" id="my-rank-name">You</div>
            <div style="font-size:11px;color:var(--text3);">Your current rank</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:14px;font-weight:800;color:var(--blue)" id="my-rank-value">--</div>
          </div>
        </div>
        <div id="leaderboard-list"><div class="empty-state">Loading...</div></div>
      </div>
    </div>
    
</div>
<div id="toast-container"></div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script>
      let currentTab = "volume";
      let currentUser = null;

      auth.onAuthStateChanged((user) => {
        if (!user || !user.emailVerified) return;
        currentUser = user;
        loadLeaderboard("volume");
      });

      function switchTab(tab, btn) {
        currentTab = tab;
        document.querySelectorAll(".tabs .tab").forEach(t => t.classList.remove("active"));
        btn.classList.add("active");
        loadLeaderboard(tab);
      }

      function loadLeaderboard(tab) {
        const list = document.getElementById("leaderboard-list");
        list.innerHTML = '<div class="empty-state">Loading...</div>';

        // Field to sort by per tab
        const fieldMap = { volume: "totalVolume", trades: "totalTrades", referrals: "totalReferrals" };
        const labelMap = { volume: (v) => "$" + (v || 0).toLocaleString(undefined, {maximumFractionDigits:0}), trades: (v) => (v || 0) + " trades", referrals: (v) => (v || 0) + " referrals" };
        const field = fieldMap[tab];

        db.collection("leaderboard").orderBy(field, "desc").limit(50).get().then((snap) => {
          if (snap.empty) {
            list.innerHTML = '<div class="empty-state">No data yet. Start trading to appear here!</div>';
            return;
          }

          const entries = [];
          snap.forEach(doc => entries.push({ id: doc.id, ...doc.data() }));

          // Find current user rank
          const myIndex = entries.findIndex(e => e.userId === currentUser?.uid);
          if (myIndex !== -1) {
            const me = entries[myIndex];
            document.getElementById("my-rank-num").textContent = "#" + (myIndex + 1);
            document.getElementById("my-rank-name").textContent = me.displayName || "You";
            document.getElementById("my-rank-value").textContent = labelMap[tab](me[field]);
          } else {
            document.getElementById("my-rank-num").textContent = "--";
            document.getElementById("my-rank-value").textContent = "Not ranked";
          }

          const medals = ["🥇", "🥈", "🥉"];
          list.innerHTML = entries.map((e, i) => {
            const isMe = e.userId === currentUser?.uid;
            return `<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;${isMe ? "border:1px solid var(--blue);" : ""}">
              <div style="font-size:${i < 3 ? "22" : "14"}px;font-weight:900;color:${i < 3 ? "var(--blue)" : "var(--text3)"};width:36px;text-align:center;">${i < 3 ? medals[i] : "#" + (i + 1)}</div>
              <div style="width:36px;height:36px;border-radius:50%;background:${isMe ? "var(--blue)" : "var(--bg3)"};color:${isMe ? "#0b0e11" : "var(--text)"};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;">${(e.displayName || "?")[0].toUpperCase()}</div>
              <div style="flex:1">
                <div style="font-size:13px;font-weight:700;color:${isMe ? "var(--blue)" : "var(--text)"};">${e.displayName || "Trader"}${isMe ? " (You)" : ""}</div>
                <div style="font-size:11px;color:var(--text3);">${e.country || ""}</div>
              </div>
              <div style="font-size:14px;font-weight:800;color:${i === 0 ? "var(--blue)" : "var(--text)"};">${labelMap[tab](e[field])}</div>
            </div>`;
          }).join("");
        }).catch(() => {
          list.innerHTML = '<div class="empty-state">Unable to load leaderboard.</div>';
        });
      }
    </script>
  </body>
</html>
