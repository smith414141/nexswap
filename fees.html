<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fee Schedule — Kripex</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <div class="page">
      <div class="pc-main" style="padding: 40px;">
        <h1 style="margin-bottom: 24px;">Fee Schedule</h1>
        <div class="card" style="padding: 0; border-radius: 16px; overflow: hidden;">
          <table class="admin-table" style="width: 100%; text-align: left; border-collapse: collapse;">
            <thead>
              <tr style="background: var(--bg3);">
                <th style="padding: 16px;">VIP Level</th>
                <th style="padding: 16px;">Maker Fee</th>
                <th style="padding: 16px;">Taker Fee</th>
                <th style="padding: 16px;">Withdrawal Limit</th>
              </tr>
            </thead>
            <tbody>
              <tr style="border-bottom: 1px solid var(--border);">
                <td style="padding: 16px;">VIP 0</td>
                <td style="padding: 16px;">0.10%</td>
                <td style="padding: 16px;">0.10%</td>
                <td style="padding: 16px;">2 BTC</td>
              </tr>
              <tr style="border-bottom: 1px solid var(--border);">
                <td style="padding: 16px;">VIP 1</td>
                <td style="padding: 16px;">0.08%</td>
                <td style="padding: 16px;">0.09%</td>
                <td style="padding: 16px;">5 BTC</td>
              </tr>
              <tr style="border-bottom: 1px solid var(--border);">
                <td style="padding: 16px;">VIP 2</td>
                <td style="padding: 16px;">0.06%</td>
                <td style="padding: 16px;">0.08%</td>
                <td style="padding: 16px;">10 BTC</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
