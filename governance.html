<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Kripex — Governance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body class="has-pc-nav">
    <div class="pc-nav">
      <a class="pc-nav-logo" href="home.html" style="text-decoration: none">⚡ Kripex</a>
      <div class="pc-nav-right"><button class="btn-logout" onclick="logoutUser()">Logout</button></div>
    </div>
    <div class="page">
      <div class="pc-main">
        <div class="top-bar"><div class="top-bar-logo">⚡ Kripex</div></div>

        <div id="region-gate" class="region-gate-card">
          <div class="region-gate-icon">🔒</div>
          <div class="region-gate-title">Not available in your region</div>
          <p class="region-gate-text">
            <span class="region-gate-feature-name">Governance</span> isn't currently offered for accounts registered in
            <span class="region-gate-current-region">your region</span>.
          </p>
          <button class="btn-primary" onclick="window.location.href='settings.html'">Change Region</button>
        </div>

        <div id="feature-content" style="display:none; padding:16px">
          <p class="section-title">Governance Proposals</p>
          <div id="gov-list" style="display:flex; flex-direction:column; gap:12px"></div>
        </div>
      </div>
    </div>
    <div class="bottom-nav">
      <button class="nav-item" onclick="window.location.href='home.html'"><span class="nav-label">Home</span></button>
      <button class="nav-item active" onclick="window.location.href='products.html'"><span class="nav-label">Products</span></button>
      <button class="nav-item" onclick="window.location.href='wallet.html'"><span class="nav-label">Wallet</span></button>
      <button class="nav-item" onclick="window.location.href='profile.html'"><span class="nav-label">Profile</span></button>
    </div>
    <div id="toast-container"></div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script src="region-gate.js"></script>
    <script src="governance.js"></script>
  </body>
</html>
