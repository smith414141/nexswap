<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fees – Kripex</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <div class="page">
      <div class="top-bar">
        <span style="font-size: 20px; cursor: pointer" onclick="goBack()"
          >←</span
        >
        <div class="top-bar-logo">Fee Schedule</div>
        <span style="width: 20px"></span>
      </div>
      <div style="padding: 16px">
        <div class="card">
          <div class="payment-info-row">
            <span>Maker Fee</span><strong>0.10%</strong>
          </div>
          <div class="payment-info-row">
            <span>Taker Fee</span><strong>0.20%</strong>
          </div>
          <div class="payment-info-row">
            <span>P2P Trading</span><strong>Free</strong>
          </div>
          <div class="payment-info-row">
            <span>Withdrawal (BTC)</span><strong>0.0005 BTC</strong>
          </div>
          <div class="payment-info-row">
            <span>Withdrawal (USDT-TRC20)</span><strong>1 USDT</strong>
          </div>
        </div>
        <p style="font-size: 11px; color: var(--text3); margin-top: 12px">
          All fees are subject to change. Volume discounts available for traders
          > $1M/month.
        </p>
      </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
  </body>
</html>
