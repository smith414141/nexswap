<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Wallet — Kripex</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <div class="page">
      <div class="pc-main">
        <div class="section-padding">
          <p class="section-title">My Wallet</p>
          <div
            id="wallet-total-card"
            class="card"
            style="text-align: center; margin-bottom: 20px"
          >
            <div class="text-muted" style="font-size: 11px; margin-bottom: 4px">
              Total Balance
            </div>
            <div id="wallet-total-usd" style="font-size: 32px; font-weight: 900" class="text-mono">
              $0.00
            </div>
          </div>
          
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
            <a href="deposit.html" class="card" style="text-decoration:none;text-align:center;padding:16px;">
              <div style="font-size:20px;margin-bottom:4px;">⬇️</div>
              <div style="font-size:12px;font-weight:700;">Deposit</div>
            </a>
            <a href="withdraw.html" class="card" style="text-decoration:none;text-align:center;padding:16px;">
              <div style="font-size:20px;margin-bottom:4px;">⬆️</div>
              <div style="font-size:12px;font-weight:700;">Withdraw</div>
            </a>
          </div>

          <p class="section-title">Balances</p>
          <div id="wallet-balances-list" class="card" style="padding:0;">
            <div class="empty-state">Loading...</div>
          </div>
        </div>
      </div>
    </div>
    <div class="bottom-nav">
      <button class="nav-item" onclick="window.location.href='home.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10"
          />
        </svg>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" onclick="window.location.href='p2p.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M7 3L3 7l4 4" />
          <path d="M3 7h13a4 4 0 014 4v1" />
          <path d="M17 21l4-4-4-4" />
          <path d="M21 17H8a4 4 0 01-4-4v-1" />
        </svg>
        <span class="nav-label">P2P</span>
      </button>
      <button
        class="nav-item active"
        onclick="window.location.href='wallet.html'"
      >
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="2" y="5" width="20" height="14" rx="2" />
          <path d="M16 12h2" />
        </svg>
        <span class="nav-label">Wallet</span>
      </button>
      <button class="nav-item" onclick="window.location.href='markets.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 3v18h18" />
          <path d="M18 17V9" />
          <path d="M13 17V5" />
          <path d="M8 17v-3" />
        </svg>
        <span class="nav-label">Markets</span>
      </button>
      <button class="nav-item" onclick="window.location.href='profile.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="8" r="4" />
          <path d="M4 21c0-4 4-6 8-6s8 2 8 6" />
        </svg>
        <span class="nav-label">Profile</span>
      </button>
    </div>
    <div id="toast-container"></div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script src="wallet.js"></script>
    <script>
      auth.onAuthStateChanged((user) => {
        if (!user || !user.emailVerified) return;
        db.collection("wallets").doc(user.uid).onSnapshot((doc) => {
          if (!doc.exists) return;
          const data = doc.data();
          const list = document.getElementById("wallet-balances-list");
           const coins = typeof CRYPTO_LIST !== "undefined" ? CRYPTO_LIST : [];
           let html = "";
           coins.forEach((c) => {
             const bal = data[c.symbol] || 0;
             if (bal <= 0) return;
             html += '<div class="listing-card" style="display:flex;align-items:center;gap:12px;padding:12px 16px;">';
             html += '<div style="width:36px;height:36px;border-radius:50%;background:' + c.color + '22;color:' + c.color + ';display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;">' + c.icon + "</div>";
             html += '<div style="flex:1;"><div style="font-size:13px;font-weight:700;">' + c.symbol + "</div><div class='text-muted' style='font-size:11px;'>" + c.name + "</div></div>";
             const decimals = c.symbol === "BTC" ? 8 : bal < 1 ? 6 : 4;
             html += '<div class="text-mono" style="text-align:right;font-size:13px;font-weight:700;">' + bal.toFixed(decimals) + "</div></div>";
           });
           list.innerHTML = html || '<div class="empty-state">No balances yet. Deposit to get started.</div>';

        });
      });
    </script>
  </body>
</html>
