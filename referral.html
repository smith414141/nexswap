<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Referral – Kripex</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <div class="page">
      <div class="top-bar">
        <span style="font-size: 20px; cursor: pointer" onclick="goBack()"
          >←</span
        >
        <div class="top-bar-logo">Referral</div>
        <span style="width: 20px"></span>
      </div>
      <div style="padding: 16px; text-align: center">
        <div style="font-size: 40px">🤝</div>
        <div style="font-weight: 800; font-size: 20px">
          Invite Friends, Earn 10%
        </div>
        <p style="color: var(--text2)">
          Share your referral link and earn 10% of their trading fees for life.
        </p>
        <div class="card" style="display: flex; gap: 8px">
          <input
            type="text"
            value="kripex.it.com/ref/YOUR_CODE"
            readonly
            style="
              flex: 1;
              background: var(--bg);
              border: none;
              padding: 10px;
              border-radius: 8px;
              color: var(--text);
            "
          /><button
            onclick="navigator.clipboard.writeText('kripex.it.com/ref/YOUR_CODE')"
          >
            📋 Copy
          </button>
        </div>
      </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
  </body>
</html>
