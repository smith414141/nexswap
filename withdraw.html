      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />

      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body class="has-pc-nav">
    <canvas id="bg-canvas"></canvas>

    <div class="pc-nav">
      <a class="pc-nav-logo" href="home.html" style="text-decoration: none"
        ><span class="logo-icon-mini">K</span>Kripex</a
      >
      <div class="pc-nav-right">
        <span class="kyc-badge" id="kyc-badge-pc" style="display: none"></span>
        <button class="btn-logout" onclick="logoutUser()">Logout</button>
      </div>
    </div>

    <div class="pc-sidebar">
      <a class="pc-sidebar-link" href="home.html"
        ><svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"

        >
          <path
            d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10"
          /></svg

      >
      <a class="pc-sidebar-link" href="p2p.html"
        ><svg
          viewBox="0 0 24 24"
          fill="none"

        >
          <path d="M7 3L3 7l4 4" />

          <path d="M17 21l4-4-4-4" />
          <path d="M21 17H8a4 4 0 01-4-4v-1" /></svg
        >P2P</a
      >
      <a class="pc-sidebar-link" href="deposit.html"
        ><svg

          stroke-width="2"
        >
          <path d="M12 3v12" />
          <path d="M7 10l5 5 5-5" />
          <path d="M5 19h14" /></svg
        >Deposit</a
      >
      <a class="pc-sidebar-link active" href="withdraw.html"
        ><svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M12 19V7" />
          <path d="M7 12l5-5 5 5" />
          <path d="M5 19h14" /></svg
        >Withdraw</a
      >
      <a class="pc-sidebar-link" href="messages.html"
        ><svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
          /></svg
        >Messages</a
      >
      <a class="pc-sidebar-link" href="profile.html"
        ><svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="8" r="4" />
          <path d="M4 21c0-4 4-6 8-6s8 2 8 6" /></svg
        >Profile</a
      >
      <a class="pc-sidebar-link" href="settings.html"
        ><svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"
          /></svg
        >Settings</a
      >
    </div>

    <div class="page">
      <div class="pc-main">
        <div class="section-padding">
          <p class="section-title">Withdraw</p>
          <div class="card" style="margin-bottom: 20px; text-align: center">
            <p class="text-muted" style="font-size: 11px; margin-bottom: 4px">
              Available Balance
            </p>
            <div id="wd-balance" style="font-size: 32px; font-weight: 900" class="text-mono">
              0.00 USDT
            </div>
          </div>

          <p class="section-title">Select Crypto</p>
          <div class="tabs" style="margin-bottom: 16px">
            <button class="tab active" id="wd-usdt" onclick="selectWithdrawCrypto('USDT')">USDT</button>
            <button class="tab" id="wd-btc" onclick="selectWithdrawCrypto('BTC')">BTC</button>
          </div>

          <p class="section-title">Select Network</p>
          <div id="wd-network-options" style="display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;"></div>

          <p class="section-title">Withdrawal Address</p>
          <div class="input-row" style="margin-bottom: 16px;">
            <input type="text" id="wd-address" placeholder="Paste wallet address" />
            <button onclick="openAddressBook()" class="btn btn-secondary" style="padding: 8px 12px; font-size: 12px;">Book</button>
            <button onclick="saveCurrentAddress()" class="btn btn-secondary" style="padding: 8px 12px; font-size: 12px;">Save</button>
          </div>

          <p class="section-title">Amount</p>
          <div class="input-row">
            <input type="number" id="wd-amount" placeholder="0.00" min="0" oninput="updateWdSummary()" />
            <span class="input-suffix text-brass" id="wd-amount-suffix">USDT</span>
          </div>
          <p class="text-muted" style="font-size: 11px; margin-top: -8px; margin-bottom: 16px;">
            <span onclick="setMaxWithdraw()" style="color: var(--yellow); cursor: pointer; font-weight: 600">MAX</span> 
            available: <span id="wd-max-display">0.00</span>
          </p>

          <div class="card" style="margin-bottom: 16px">
            <div class="flex-between" style="font-size: 13px; margin-bottom: 8px;">
              <span class="text-muted">Network Fee</span>
              <span id="wd-fee">--</span>
            </div>
            <div class="flex-between" style="font-size: 13px; font-weight: 700; padding-top: 8px; border-top: 1px solid var(--border);">
              <span>You'll Receive</span>
              <span id="wd-receive">--</span>
            </div>
          </div>

          <button class="btn btn-primary" style="width:100%;" onclick="submitWithdrawal()">Submit Withdrawal</button>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-item" onclick="window.location.href='home.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10"
          />
        </svg>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" onclick="window.location.href='p2p.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M7 3L3 7l4 4" />
          <path d="M3 7h13a4 4 0 014 4v1" />
          <path d="M17 21l4-4-4-4" />
          <path d="M21 17H8a4 4 0 01-4-4v-1" />
        </svg>
        <span class="nav-label">P2P</span>
      </button>
      <button class="nav-item" onclick="window.location.href='markets.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 3v18h18" />
          <path d="M18 17V9" />
          <path d="M13 17V5" />
          <path d="M8 17v-3" />
        </svg>
        <span class="nav-label">Markets</span>
      </button>
      <button class="nav-item" onclick="window.location.href='deposit.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 3v12" />
          <path d="M7 10l5 5 5-5" />
          <path d="M5 19h14" />
        </svg>
        <span class="nav-label">Deposit</span>
      </button>
      <button class="nav-item" onclick="window.location.href='messages.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"

          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
        </svg>
        <span class="nav-label">Messages</span>
      </button>
      <button class="nav-item" onclick="window.location.href='profile.html'">
        <svg
          class="nav-icon-svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="8" r="4" />
          <path d="M4 21c0-4 4-6 8-6s8 2 8 6" />
        </svg>
        <span class="nav-label">Profile</span>
      </button>
    </div>

    <div id="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script src="wallet.js"></script>
    <script src="withdraw.js"></script>
    <div id="address-book-modal" class="modal-overlay" style="display: none">
      <div class="modal-sheet">
        <div class="modal-header">
          <span class="modal-title">📋 Saved Addresses</span>
          <span
            class="modal-close"
            onclick="document.getElementById('address-book-modal').style.display='none'"
            >✕</span
          >
        </div>
        <div style="padding: 16px">
          <div id="address-book-list">
            <div class="empty-state">Loading...</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
