<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>CryptoSwap — Home</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>

    <div class="page">
      <!-- TOP BAR -->
      <div class="top-bar">
        <div class="top-bar-logo">⚡ CryptoSwap</div>
        <div class="top-bar-right">
          <span
            style="font-size: 18px; cursor: pointer"
            onclick="refreshHomeData()"
            id="refresh-icon"
            >🔄</span
          >
          <span class="kyc-badge none" id="kyc-badge">No KYC</span>
        </div>
      </div>

      <!-- BALANCE SECTION -->
      <div style="padding: 20px 16px">
        <p class="section-title">Total Balance</p>
        <div class="balance-total" id="total-balance">$0.00</div>

        <div class="divider"></div>

        <div style="display: flex; flex-direction: column; gap: 12px">
          <div
            class="card"
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
            "
          >
            <div style="display: flex; align-items: center; gap: 10px">
              <div class="coin-icon btc">₿</div>
              <div>
                <div style="font-weight: 700; font-size: 14px">BTC</div>
                <div style="font-size: 11px; color: var(--text2)">Bitcoin</div>
              </div>
            </div>
            <div style="text-align: right">
              <div style="font-weight: 700; font-size: 14px" id="btc-balance">
                0.00000000
              </div>
              <div
                style="font-size: 11px; color: var(--text2)"
                id="btc-balance-usd"
              >
                $0.00
              </div>
            </div>
          </div>

          <div
            class="card"
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
            "
          >
            <div style="display: flex; align-items: center; gap: 10px">
              <div class="coin-icon usdt">₮</div>
              <div>
                <div style="font-weight: 700; font-size: 14px">USDT</div>
                <div style="font-size: 11px; color: var(--text2)">Tether</div>
              </div>
            </div>
            <div style="text-align: right">
              <div style="font-weight: 700; font-size: 14px" id="usdt-balance">
                0.00
              </div>
              <div
                style="font-size: 11px; color: var(--text2)"
                id="usdt-balance-usd"
              >
                $0.00
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- QUICK ACTIONS -->
      <div style="padding: 0 16px 20px">
        <div style="display: flex; gap: 10px">
          <button
            class="btn-primary"
            style="margin: 0; flex: 1"
            onclick="window.location.href='deposit.html'"
          >
            ⬇️ Deposit
          </button>
          <button
            class="btn-secondary"
            style="margin: 0; flex: 1"
            onclick="window.location.href='withdraw.html'"
          >
            ⬆️ Withdraw
          </button>
          <button
            class="btn-secondary"
            style="
              margin: 0;
              flex: 1;
              border-color: var(--yellow);
              color: var(--yellow);
            "
            onclick="window.location.href='p2p.html'"
          >
            🔄 P2P
          </button>
        </div>
      </div>

      <!-- LIVE MARKET PRICES -->
      <div style="padding: 0 16px 20px">
        <p class="section-title">Live Market Prices</p>
        <div class="card" id="market-prices">
          <div class="ticker-item">
            <div class="ticker-coin">
              <div class="coin-icon btc">₿</div>
              <div>
                <div class="coin-name">BTC</div>
                <div class="coin-fullname">Bitcoin</div>
              </div>
            </div>
            <div>
              <div class="ticker-price" id="price-btc">$--</div>
              <div class="ticker-change" id="change-btc">--%</div>
            </div>
          </div>
          <div class="ticker-item">
            <div class="ticker-coin">
              <div class="coin-icon eth">Ξ</div>
              <div>
                <div class="coin-name">ETH</div>
                <div class="coin-fullname">Ethereum</div>
              </div>
            </div>
            <div>
              <div class="ticker-price" id="price-eth">$--</div>
              <div class="ticker-change" id="change-eth">--%</div>
            </div>
          </div>
          <div class="ticker-item">
            <div class="ticker-coin">
              <div class="coin-icon usdt">₮</div>
              <div>
                <div class="coin-name">USDT</div>
                <div class="coin-fullname">Tether</div>
              </div>
            </div>
            <div>
              <div class="ticker-price" id="price-usdt">$--</div>
              <div class="ticker-change" id="change-usdt">--%</div>
            </div>
          </div>
          <div class="ticker-item">
            <div class="ticker-coin">
              <div class="coin-icon bnb">B</div>
              <div>
                <div class="coin-name">BNB</div>
                <div class="coin-fullname">BNB</div>
              </div>
            </div>
            <div>
              <div class="ticker-price" id="price-bnb">$--</div>
              <div class="ticker-change" id="change-bnb">--%</div>
            </div>
          </div>
          <div class="ticker-item">
            <div class="ticker-coin">
              <div class="coin-icon sol">S</div>
              <div>
                <div class="coin-name">SOL</div>
                <div class="coin-fullname">Solana</div>
              </div>
            </div>
            <div>
              <div class="ticker-price" id="price-sol">$--</div>
              <div class="ticker-change" id="change-sol">--%</div>
            </div>
          </div>
          <div class="ticker-item">
            <div class="ticker-coin">
              <div class="coin-icon xrp">X</div>
              <div>
                <div class="coin-name">XRP</div>
                <div class="coin-fullname">Ripple</div>
              </div>
            </div>
            <div>
              <div class="ticker-price" id="price-xrp">$--</div>
              <div class="ticker-change" id="change-xrp">--%</div>
            </div>
          </div>
        </div>
      </div>

      <!-- RECENT ACTIVITY -->
      <div style="padding: 0 16px 20px">
        <p class="section-title">Recent Activity</p>
        <div class="card" id="recent-activity">
          <p
            style="
              text-align: center;
              color: var(--text3);
              font-size: 13px;
              padding: 20px 0;
            "
          >
            No recent activity
          </p>
        </div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
      <button
        class="nav-item active"
        onclick="window.location.href='home.html'"
      >
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" onclick="window.location.href='p2p.html'">
        <span class="nav-icon">🔄</span>
        <span class="nav-label">P2P</span>
      </button>
      <button class="nav-item" onclick="window.location.href='deposit.html'">
        <span class="nav-icon">⬇️</span>
        <span class="nav-label">Deposit</span>
      </button>
      <button class="nav-item" onclick="window.location.href='withdraw.html'">
        <span class="nav-icon">⬆️</span>
        <span class="nav-label">Withdraw</span>
      </button>
      <button class="nav-item" onclick="window.location.href='profile.html'">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
      </button>
    </div>

    <div id="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script src="currencies.js"></script>
    <script src="home.js"></script>
  </body>
</html>
