<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications – Kripex</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <div class="page">
      <div class="top-bar">
        <span style="font-size: 20px; cursor: pointer" onclick="goBack()"
          >←</span
        >
        <div class="top-bar-logo">🔔 Notifications</div>
        <span style="width: 20px"></span>
      </div>
    <div class="page">
      <div class="pc-main">
        <div class="section-padding">
          <p class="section-title">Notifications</p>
          <div class="tabs" style="margin-bottom: 16px">
            <button class="tab active" onclick="switchNotifTab('all', this)">All</button>
            <button class="tab" onclick="switchNotifTab('alerts', this)">Price Alerts</button>
            <button class="tab" onclick="switchNotifTab('system', this)">System</button>
          </div>
          
          <div id="notif-list" class="card" style="padding:0;">
            <div class="empty-state">No notifications yet.</div>
          </div>

          <p class="section-title" style="margin-top:24px;">Create Price Alert</p>
          <div class="card">
            <div class="flex-col gap-sm">
              <select id="alert-coin" class="input-row" style="width:100%; margin:0;">
                <option value="BTC">BTC</option>
                <option value="ETH">ETH</option>
                <option value="SOL">SOL</option>
                <option value="USDT">USDT</option>
              </select>
              <select id="alert-condition" class="input-row" style="width:100%; margin:0;">
                <option value="above">Above</option>
                <option value="below">Below</option>
              </select>
              <input type="number" id="alert-price" class="input-row" placeholder="Target Price (USDT)" style="width:100%; margin:0;" />
              <button class="btn btn-primary" onclick="createPriceAlert()">Set Alert</button>
            </div>
          </div>
          <div id="active-alerts" style="margin-top: 12px"></div>
        </div>
      </div>
    </div>
    </div>
    <div id="toast-container"></div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script src="notifications.js"></script>
  </body>
</html>
