<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proof of Reserves – Kripex</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <div class="page">
      <div class="top-bar">
        <span style="font-size: 20px; cursor: pointer" onclick="goBack()"
          >←</span
        >
        <div class="top-bar-logo">Proof of Reserves</div>
        <span style="width: 20px"></span>
      </div>
      <div style="padding: 16px">
        <div class="card">
          <div style="text-align: center; padding: 20px 0">
            <div style="font-size: 40px">🏦</div>
            <div style="font-size: 18px; font-weight: 800; margin: 10px 0">
              Total User Assets
            </div>
            <div
              style="font-size: 28px; font-weight: 900; color: var(--yellow)"
            >
              $24,500,000
            </div>
          </div>
          <div style="border-top: 1px solid var(--border); padding-top: 16px">
            <div class="payment-info-row">
              <span>BTC Reserve</span><strong>350 BTC</strong>
            </div>
            <div class="payment-info-row">
              <span>USDT Reserve</span><strong>12,000,000 USDT</strong>
            </div>
            <div class="payment-info-row">
              <span>ETH Reserve</span><strong>4,200 ETH</strong>
            </div>
          </div>
          <p style="font-size: 11px; color: var(--text3); margin-top: 12px">
            Snapshot taken daily at 00:00 UTC. Audited by third-party security
            firm.
          </p>
        </div>
      </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
  </body>
</html>
