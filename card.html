<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Card – Kripex</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <div class="page">
      <div class="top-bar">
        <span style="font-size: 20px; cursor: pointer" onclick="goBack()"
          >←</span
        >
        <div class="top-bar-logo">💳 Demo Card</div>
        <span style="width: 20px"></span>
      </div>
      <div style="padding: 20px; text-align: center">
        <div
          style="
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 30px;
            color: #fff;
            max-width: 340px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
          "
        >
          <div
            style="
              display: flex;
              justify-content: space-between;
              font-size: 12px;
              opacity: 0.6;
            "
          >
            💳 Kripex
          </div>
          <div
            style="
              font-size: 20px;
              letter-spacing: 3px;
              margin: 20px 0;
              font-family: monospace;
            "
          >
            •••• •••• •••• 8888
          </div>
          <div style="display: flex; justify-content: space-between">
            <div>
              <span style="font-size: 10px; opacity: 0.6">CARDHOLDER</span>
              <div>John Doe</div>
            </div>
            <div>
              <span style="font-size: 10px; opacity: 0.6">EXPIRES</span>
              <div>12/26</div>
            </div>
          </div>
        </div>
        <p style="font-size: 12px; color: var(--text3); margin-top: 16px">
          This is a simulated card for demo purposes only. No real funds are
          attached.
        </p>
        <button class="btn-primary" onclick="window.location.href='home.html'">
          Back to Home
        </button>
      </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
  </body>
</html>
