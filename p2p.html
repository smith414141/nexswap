    <div class="page">
      <div class="pc-main">
        <!-- TOP BAR -->
        <div class="top-bar">
          <span style="font-size: 20px; cursor: pointer" onclick="goBack()"
            >←</span
          >
          <div class="top-bar-logo">⚡ Kripex</div>
          <div class="top-bar-right">
            <span class="kyc-badge" id="kyc-badge" style="display: none"></span>
          </div>
        </div>

    <div class="page">
      <div class="pc-main" style="padding: 24px;">
        <p class="section-title" style="margin-bottom: 24px;">P2P Exchange</p>
        
        <!-- P2P HEADER -->
        <div class="card" style="padding: 16px; margin-bottom: 24px; border-radius: 20px;">
          <div class="flex-between">
            <div class="tabs" style="width: 140px">
              <button class="tab active" id="tab-buy" onclick="setOrderType('buy')">Buy</button>
              <button class="tab" id="tab-sell" onclick="setOrderType('sell')">Sell</button>
            </div>

            <div style="display: flex; align-items: center; gap: 6px; cursor: pointer;" onclick="openCurrencyPicker()">
              <span style="font-size: 18px" id="selected-flag">🇪🇹</span>
              <span style="font-weight: 700; font-size: 14px" id="selected-currency">ETB</span>
              <span class="text-muted" style="font-size: 14px">▾</span>
            </div>
          </div>
        </div>

        <!-- CRYPTO SELECTOR -->
        <div style="margin-bottom: 24px; display: flex; gap: 12px">
          <button class="crypto-pill active" id="tab-usdt" onclick="setCrypto('USDT')">USDT</button>
          <button class="crypto-pill" id="tab-btc" onclick="setCrypto('BTC')">BTC</button>
        </div>

        <!-- AMOUNT FILTER -->
        <div style="margin-bottom: 24px">
          <div class="input-row" style="margin: 0; border-radius: 12px; padding: 16px;">
            <input type="number" id="amount-filter" placeholder="Filter by amount" min="0" oninput="filterByAmount()" />
            <span class="input-suffix text-gold" id="amount-currency-label">ETB</span>
          </div>
        </div>

        <!-- LISTINGS -->
        <div id="listings-container" class="card" style="padding:0; border-radius: 20px; overflow: hidden;">
          <!-- listings render here -->
        </div>
      </div>
    </div>
      </div>

      <!-- CURRENCY PICKER MODAL -->
      <div id="currency-modal" class="modal-overlay" style="display: none">
        <div class="modal-sheet">
          <div class="modal-header">
            <span class="modal-title">Select Currency</span>
            <span class="modal-close" onclick="closeCurrencyPicker()">✕</span>
          </div>
          <div class="input-row" style="margin: 0 16px 12px">
            <span class="input-suffix">🔍</span>
            <input
              type="text"
              id="currency-search"
              placeholder="Search currency..."
              oninput="renderCurrencyList()"
            />
          </div>
          <div id="currency-list" class="modal-list"></div>
        </div>
      </div>
    </div>

    <!-- BOTTOM NAV -->

        class="nav-item active"
        onclick="window.location.href='home.html'"
      >

          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10"
          />
        </svg>
        <span class="nav-label">Home</span>
      </button>

          <path d="M17 21l4-4-4-4" />
          <path d="M21 17H8a4 4 0 01-4-4v-1" />
        </svg>
        <span class="nav-label">P2P</span>
      </button>
      <button class="nav-item" onclick="window.location.href='portfolio.html'">
        <svg

          fill="none"
          stroke="currentColor"
          stroke-width="2"

          stroke-linejoin="round"

          <path d="M11 5l4 4L21 3" />
        </svg>

      <button class="nav-item" onclick="window.location.href='markets.html'">

      <button class="nav-item" onclick="window.location.href='messages.html'">

        </svg>

      </button>
      <button class="nav-item" onclick="window.location.href='profile.html'">

          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"

        </svg>
