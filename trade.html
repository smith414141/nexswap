<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trade — Kripex</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="trade.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <div class="page" style="padding-bottom:0">

      <!-- TOP BAR -->
      <div class="top-bar">
        <span style="font-size:20px;cursor:pointer" onclick="goBack()">←</span>
        <div class="flex-col" style="align-items:center;">
          <span id="trade-pair" style="font-weight:900;font-size:16px;">BTC/USDT</span>
          <span id="trade-price" style="font-size:12px;font-weight:700;color:var(--green);">--</span>
        </div>
        <span style="width:20px"></span>
      </div>

      <!-- PAIR PILLS -->
      <div style="display:flex;gap:6px;padding:12px;overflow-x:auto;border-bottom:1px solid var(--border);">
        <button id="pill-BTCUSDT" class="crypto-pill active" onclick="setPair('BTCUSDT')">BTC</button>
        <button id="pill-ETHUSDT" class="crypto-pill" onclick="setPair('ETHUSDT')">ETH</button>
        <button id="pill-SOLUSDT" class="crypto-pill" onclick="setPair('SOLUSDT')">SOL</button>
        <button id="pill-BNBUSDT" class="crypto-pill" onclick="setPair('BNBUSDT')">BNB</button>
        <button id="pill-XRPUSDT" class="crypto-pill" onclick="setPair('XRPUSDT')">XRP</button>
        <button id="pill-DOGEUSDT" class="crypto-pill" onclick="setPair('DOGEUSDT')">DOGE</button>
      </div>

      <div class="trade-grid">
        <!-- CHART -->
        <div class="trade-chart-wrap" style="padding:16px;">
          <div id="tradingview-widget" style="height:300px;background:var(--bg2);border-radius:12px;"></div>
        </div>

        <!-- SIDEBAR -->
        <div class="trade-sidebar" style="padding:0 16px;">
          <!-- ORDER BOOK -->
          <div class="card" style="margin-bottom:16px;">
            <p class="section-title">Order Book</p>
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:8px;">
              <span>Price (USDT)</span><span>Amount</span>
            </div>
            <div id="order-book-asks" style="color:var(--red);"></div>
            <div style="margin:8px 0;text-align:center;font-size:14px;font-weight:800;padding:4px 0;background:var(--bg3);border-radius:6px;" id="spread-price">--</div>
            <div id="order-book-bids" style="color:var(--green);"></div>
          </div>

          <!-- TRADE FORM -->
          <div class="card">
            <div class="flex-between" style="margin-bottom:16px;">
              <span style="font-size:12px;color:var(--text3);">Available:</span>
              <span class="text-mono" style="font-size:12px;"><span id="balance-quote">--</span> USDT</span>
            </div>

            <div class="tabs" style="margin-bottom:16px;">
              <button class="tab active" onclick="switchOrderType('limit',this)">Limit</button>
              <button class="tab" onclick="switchOrderType('market',this)">Market</button>
            </div>

            <div class="form-group">
              <label>Price (USDT)</label>
              <input type="number" id="trade-price-input" placeholder="0.00" />
            </div>
            <div class="form-group">
              <label>Amount</label>
              <input type="number" id="trade-amount-input" placeholder="0.00" />
            </div>
            
            <div style="margin-bottom:20px;">
              <div class="flex-between" style="font-size:12px;color:var(--text2);margin-bottom:8px;">
                <span>Total</span>
                <span id="trade-total-preview" class="text-mono">0.00 USDT</span>
              </div>
              <div style="display:flex;gap:8px;">
                <button class="btn btn-secondary" style="flex:1;padding:8px 0;font-size:11px;" onclick="setPercent(25,'buy')">25%</button>
                <button class="btn btn-secondary" style="flex:1;padding:8px 0;font-size:11px;" onclick="setPercent(50,'buy')">50%</button>
                <button class="btn btn-secondary" style="flex:1;padding:8px 0;font-size:11px;" onclick="setPercent(75,'buy')">75%</button>
                <button class="btn btn-secondary" style="flex:1;padding:8px 0;font-size:11px;" onclick="setPercent(100,'buy')">100%</button>
              </div>
            </div>

            <div style="display:flex;gap:12px;">
              <button id="buy-btn" class="btn btn-primary" style="flex:1;background:var(--green);color:#fff;" onclick="placeOrder('buy')">Buy</button>
              <button id="sell-btn" class="btn btn-primary" style="flex:1;background:var(--red);color:#fff;" onclick="placeOrder('sell')">Sell</button>
            </div>
          </div>
        </div>
      </div>

          <!-- REGION LOCK -->
          <div id="region-lock-message" style="display:none;background:rgba(246,70,93,0.1);border:1px solid var(--red);border-radius:8px;padding:10px;margin-top:8px;text-align:center;font-size:12px;color:var(--red);">
            ⚠️ Futures & Margin are restricted in your region. Change region in Settings.
          </div>

          <!-- TRADE HISTORY -->
          <div style="margin-top:10px;">
            <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;">Recent Trades</div>
            <div id="trade-history-list"><div style="font-size:11px;color:var(--text3);">No trades yet.</div></div>
          </div>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script src="wallet.js"></script>
    <script src="trade.js"></script>
  </body>
</html>
